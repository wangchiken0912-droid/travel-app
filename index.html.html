<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>大阪・京都行程</title>
  <style>
    :root {
      --bg: #f6f7f8;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --line: #e5e7eb;
      --line-soft: #f1f5f9;
      --primary: #2f80a8;
      --primary-dark: #1f5f7e;
      --primary-soft: #e7f4f8;
      --warning: #f59e0b;
      --warning-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.07);
      --shadow-soft: 0 8px 22px rgba(15, 23, 42, 0.05);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 0 0 calc(78px + var(--safe-bottom));
      background:
        radial-gradient(circle at top right, rgba(47, 128, 168, 0.08), transparent 34%),
        var(--bg);
    }

    .page {
      min-height: calc(100dvh - 78px);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(246, 247, 248, 0.92);
      backdrop-filter: blur(18px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .trip-title {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .trip-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.5;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
    }

    .ghost-btn:active,
    .primary-btn:active,
    .secondary-btn:active,
    .date-chip:active,
    .nav-btn:active,
    .card-button:active {
      transform: scale(0.985);
    }

    .content {
      padding: 14px 18px 0;
    }

    .section {
      margin: 0 0 14px;
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.01em;
    }

    .section-title span {
      color: var(--light);
      font-size: 12px;
      font-weight: 800;
    }

    .hero {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 18px;
    }

    .date-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .hero h2 {
      margin: 14px 0 0;
      font-size: 28px;
      font-weight: 950;
      line-height: 1.12;
      letter-spacing: -0.045em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line-soft);
      background: #fff;
    }

    .hero-stat {
      padding: 13px 10px;
      text-align: center;
      border-right: 1px solid var(--line-soft);
    }

    .hero-stat:last-child {
      border-right: 0;
    }

    .hero-stat strong {
      display: block;
      font-size: 18px;
      font-weight: 950;
    }

    .hero-stat span {
      display: block;
      margin-top: 2px;
      color: var(--light);
      font-size: 10px;
      font-weight: 950;
    }

    .next-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(47, 128, 168, 0.15);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(47, 128, 168, 0.10), rgba(255,255,255,0.0) 55%),
        #fff;
      box-shadow: var(--shadow);
    }

    .next-card-inner {
      padding: 16px;
    }

    .eyebrow {
      color: var(--primary);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.08em;
    }

    .next-title {
      margin: 8px 0 0;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .next-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 26px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
    }

    .pill.primary {
      border-color: rgba(47, 128, 168, 0.15);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .pill.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .next-address {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .primary-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 950;
      transition: transform 0.16s ease;
    }

    .primary-btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .secondary-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .notice {
      border: 1px solid rgba(47, 128, 168, 0.12);
      border-radius: var(--radius-lg);
      background: var(--primary-soft);
      padding: 12px 13px;
      color: #1f5f7e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.65;
    }

    .notice.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .status-message {
      margin: 0 0 12px;
      border: 1px solid rgba(245, 158, 11, 0.20);
      border-radius: var(--radius-md);
      background: var(--warning-soft);
      padding: 10px 12px;
      color: #92400e;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.55;
    }

    .date-rail {
      position: sticky;
      top: 75px;
      z-index: 25;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -18px 12px;
      padding: 8px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(246, 247, 248, 0.92);
      backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    .date-rail::-webkit-scrollbar,
    .map-stop-row::-webkit-scrollbar {
      display: none;
    }

    .date-chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      transition: transform 0.16s ease;
    }

    .date-chip.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .stop-list {
      display: grid;
      gap: 12px;
    }

    .stop-card {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .stop-main {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .thumb {
      position: relative;
      flex: 0 0 96px;
      width: 96px;
      height: 96px;
      overflow: hidden;
      border-radius: 19px;
      background: #eef2f6;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.68);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.76), transparent 28%),
        linear-gradient(145deg, var(--thumb-a), var(--thumb-b) 54%, var(--thumb-c));
    }

    .thumb-placeholder::before {
      content: "";
      position: absolute;
      inset: 9px;
      z-index: -1;
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 15px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 42%),
        radial-gradient(circle at 18% 84%, rgba(255, 255, 255, 0.3), transparent 24%);
    }

    .thumb-placeholder::after {
      content: "";
      position: absolute;
      right: -18px;
      bottom: -18px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    .thumb-placeholder svg {
      width: 46px;
      height: 46px;
      color: rgba(255, 255, 255, 0.92);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.65;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.18));
    }

    .thumb-placeholder.scene {
      --thumb-a: #7cc7d9;
      --thumb-b: #4e9ab9;
      --thumb-c: #224f70;
    }

    .thumb-placeholder.food {
      --thumb-a: #f3b37f;
      --thumb-b: #e98248;
      --thumb-c: #8f4429;
    }

    .thumb-placeholder.transport {
      --thumb-a: #90d6e7;
      --thumb-b: #36a4c0;
      --thumb-c: #1d5d7d;
    }

    .thumb-placeholder.shopping {
      --thumb-a: #b7a8f4;
      --thumb-b: #8067d7;
      --thumb-c: #423083;
    }

    .thumb-placeholder.hotel {
      --thumb-a: #adc7ef;
      --thumb-b: #648fd7;
      --thumb-c: #36598b;
    }

    .thumb-placeholder.backup {
      --thumb-a: #cbd5e1;
      --thumb-b: #94a3b8;
      --thumb-c: #475569;
    }

    .thumb-time {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.68);
      color: #fff;
      font-size: 10px;
      font-weight: 950;
      backdrop-filter: blur(10px);
    }

    .thumb-icon {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: grid;
      place-items: center;
      width: 29px;
      height: 29px;
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.15);
    }

    .stop-body {
      min-width: 0;
      flex: 1;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--card-soft);
      color: var(--muted);
      padding: 4px 7px;
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
    }

    .badge.transport {
      border-color: rgba(14, 165, 233, 0.16);
      background: #f0f9ff;
      color: #0369a1;
    }

    .badge.food {
      border-color: rgba(249, 115, 22, 0.16);
      background: #fff7ed;
      color: #c2410c;
    }

    .badge.shopping {
      border-color: rgba(124, 58, 237, 0.16);
      background: #f5f3ff;
      color: #6d28d9;
    }

    .badge.hotel {
      border-color: rgba(37, 99, 235, 0.16);
      background: #eff6ff;
      color: #1d4ed8;
    }

    .badge.confirmed {
      border-color: rgba(16, 185, 129, 0.16);
      background: #ecfdf5;
      color: #047857;
    }

    .stop-title {
      margin: 0;
      display: -webkit-box;
      overflow: hidden;
      color: var(--text);
      font-size: 15.5px;
      font-weight: 950;
      line-height: 1.25;
      letter-spacing: -0.01em;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .stop-time {
      margin-top: 5px;
      color: var(--light);
      font-size: 11px;
      font-weight: 950;
    }

    .stop-address {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.55;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .stop-note {
      margin: 0 12px 10px;
      border-radius: 14px;
      background: var(--card-soft);
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.55;
    }

    .stop-note.warning {
      background: var(--warning-soft);
      color: #92400e;
      font-weight: 850;
    }

    .stop-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 12px 12px;
    }

    .card-button {
      min-height: 38px;
      border-radius: 14px;
      text-align: center;
      font-size: 12px;
      font-weight: 950;
      line-height: 38px;
      transition: transform 0.16s ease;
    }

    .card-button.outline {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .card-button.filled {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius-lg);
      background: #fff;
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.6;
    }

    .empty strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text);
      font-size: 16px;
      font-weight: 950;
    }

    .map-card,
    .info-card,
    .search-card {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .map-head,
    .info-card,
    .search-card {
      padding: 14px;
    }

    .map-title {
      color: var(--primary);
      font-size: 12px;
      font-weight: 950;
    }

    .map-copy {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.6;
    }

    .map-frame {
      width: 100%;
      height: 330px;
      border: 0;
      display: block;
      background: #e5e7eb;
    }

    .map-stop-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 12px;
      scrollbar-width: none;
    }

    .map-stop {
      flex: 0 0 auto;
      max-width: 170px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--muted);
      padding: 9px 11px;
      text-align: left;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .map-stop.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .info-title {
      color: var(--primary);
      font-size: 12px;
      font-weight: 950;
    }

    .info-card h3 {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.25;
    }

    .info-card p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.65;
    }

    .info-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .mini-row span:first-child {
      color: var(--light);
      font-size: 12px;
      font-weight: 950;
    }

    .field {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: #fff;
      color: var(--text);
      padding: 0 13px;
      outline: none;
      font-size: 14px;
      font-weight: 800;
    }

    .field::placeholder {
      color: var(--light);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 9px;
      margin-top: 10px;
    }

    .bottom-nav {
      position: fixed;
      inset: auto 0 0;
      z-index: 100;
      border-top: 1px solid rgba(229, 231, 235, 0.76);
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      padding: 6px 10px calc(6px + var(--safe-bottom));
    }

    .bottom-nav-inner {
      width: min(100%, 430px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
    }

    .nav-btn {
      position: relative;
      border: 0;
      border-radius: 15px;
      background: transparent;
      color: #9ca6b5;
      padding: 5px 4px 4px;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .nav-btn.active {
      background: rgba(47, 128, 168, 0.1);
      color: var(--primary);
    }

    .nav-icon {
      display: grid;
      place-items: center;
      width: 27px;
      height: 24px;
      margin: 0 auto 2px;
      border-radius: 999px;
      line-height: 1;
      transition: background 0.16s ease, color 0.16s ease, box-shadow 0.16s ease;
    }

    .nav-btn.active .nav-icon {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 16px rgba(47, 128, 168, 0.24);
    }

    .nav-icon svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-label {
      display: block;
      font-size: 9.5px;
      font-weight: 850;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .loading-overlay {
      display: grid;
      place-items: center;
      min-height: 150px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 760px) {
      body {
        background: #eef1f4;
      }

      .app {
        margin-top: 18px;
        margin-bottom: 18px;
        border: 1px solid var(--line);
        border-radius: 34px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      }

      .bottom-nav {
        background: transparent;
        border-top: 0;
        pointer-events: none;
      }

      .bottom-nav-inner {
        pointer-events: auto;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.96);
        padding: 4px;
        box-shadow: var(--shadow);
      }
    }
  </style>
</head>

<body>
  <main id="app" class="app" aria-live="polite"></main>

  <script>

    function escapeHtml(value) {

    function parseCSV(text) {
      const rows = [];
      let current = "";
      let row = [];
      let insideQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(current);
          current = "";
          if (row.some((cell) => cell.trim() !== "")) rows.push(row);
          row = [];
        } else {
          current += char;
        }
      }

      row.push(current);
      if (row.some((cell) => cell.trim() !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = rows[0].map(normalizeFieldName);
      return rows.slice(1).map((cells) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = String(cells[index] ?? "").trim();
        });
        return normalizeRow(item);
      });
    }

      if (key === "food") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M13 28h22"></path><path d="M16 28c0 6 4 10 8 10s8-4 8-10"></path><path d="M18 18c0-3 2-4 2-6"></path><path d="M25 18c0-3 2-4 2-6"></path><path d="M33 13v25"></path><path d="M37 13v25"></path></svg>`;
      if (key === "shopping") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M14 19h20l-2 19H16L14 19Z"></path><path d="M19 19c0-5 2-8 5-8s5 3 5 8"></path><path d="M20 28h8"></path></svg>`;
      if (key === "hotel") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 30h25"></path><path d="M12 15v23"></path><path d="M37 24v14"></path><path d="M12 24h13v6H12z"></path><path d="M25 22h7c3 0 5 2 5 5v3"></path></svg>`;
      if (key === "backup") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 12v24"></path><path d="M12 24h24"></path><circle cx="24" cy="24" r="16"></circle></svg>`;
      return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M9 34 19 22l7 8 5-6 8 10"></path><path d="M13 34h26"></path><circle cx="32" cy="16" r="4"></circle><path d="M17 36c6 3 13 3 20 0"></path></svg>`;
    }

    function placeholderHtml(category, hidden = false) {
      const key = categoryKey(category);
      return `<div class="thumb-placeholder ${key}${hidden ? " hidden" : ""}">${placeholderSvg(category)}</div>`;
    }

    function badgeClass(value) {
      if (value === "交通" || value === "車站") return "transport";
      if (value === "餐廳") return "food";
      if (value === "購物") return "shopping";
      if (value === "住宿") return "hotel";
      if (value === "確定") return "confirmed";
      return "";
    }

    function thumbnailHtml(stop) {
      const time = stop.time || "--:--";
      const icon = categoryIcon(stop.category);
      const fallback = placeholderHtml(stop.category, Boolean(stop.imageUrl));
      const img = stop.imageUrl
        ? `<img src="${attr(stop.imageUrl)}" alt="${attr(stop.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />${fallback}`
        : fallback;

      return `
        <div class="thumb">
          ${img}
          <span class="thumb-time">${escapeHtml(time)}</span>
          <span class="thumb-icon">${escapeHtml(icon)}</span>
        </div>
      `;
    }

    function stopCardHtml(stop) {
      const title = escapeHtml(stop.title);
      const time = `${stop.time || "--:--"}${stop.endTime ? ` – ${stop.endTime}` : ""}`;
      const categoryBadge = `<span class="badge ${badgeClass(stop.category)}">${escapeHtml(stop.category)}</span>`;
      const statusBadge = stop.status ? `<span class="badge ${badgeClass(stop.status)}">${escapeHtml(stop.status)}</span>` : "";
      const durationBadge = stop.duration ? `<span class="badge">${escapeHtml(stop.duration)}</span>` : "";
      const address = stop.address ? `<div class="stop-address">${escapeHtml(stop.address)}</div>` : "";
      const transit = stop.transitNote ? `<div class="stop-note">${escapeHtml(stop.transitNote)}</div>` : "";
      const notice = stop.notice ? `<div class="stop-note warning">${escapeHtml(stop.notice)}</div>` : "";

      return `
        <article class="stop-card">
          <div class="stop-main">
            ${thumbnailHtml(stop)}
            <div class="stop-body">
              <div class="badge-row">${categoryBadge}${statusBadge}${durationBadge}</div>
              <h3 class="stop-title">${title}</h3>
              <div class="stop-time">${escapeHtml(time)}</div>
              ${address}
            </div>
          </div>
          ${transit}
          ${notice}
          <div class="stop-actions">
            <a class="card-button outline" href="${attr(buildMapsSearchUrl(stop))}" target="_blank" rel="noreferrer">查看地點</a>
            <a class="card-button filled" href="${attr(buildCurrentLocationDirectionsUrl(stop))}" target="_blank" rel="noreferrer">現在前往</a>
          </div>
        </article>
      `;
    }

    function stopListHtml(stops) {
      if (!stops.length) {
        return `
          <section class="section">
            <div class="empty">
              <strong>這天還沒有行程</strong>
              在雲端表格新增行程後，這裡會自動顯示
            </div>
          </section>
        `;
      }

      return `
        <section class="stop-list">
          ${stops.map(stopCardHtml).join("")}
        </section>
      `;
    }

    function dateRailHtml() {
      const dates = getDates();
      if (!dates.length) return "";

      return `
        <div class="date-rail">
          ${dates.map((date) => `
            <button class="date-chip ${date === state.selectedDate ? "active" : ""}" data-action="select-date" data-date="${attr(date)}">
              ${escapeHtml(formatDateLabel(date))}
            </button>
          `).join("")}
        </div>
      `;
    }

    function topHtml(titleOverride = "") {
      const settings = getSettings();
      const dates = getDates();
      const title = titleOverride || settings.tripTitle || "旅遊行程";
      const subtitle = settings.tripSubtitle || getTripRange(dates);

      return `
        <header class="top">
          <div class="top-row">
            <div>
              <h1 class="trip-title">${escapeHtml(title)}</h1>
              <p class="trip-subtitle">${escapeHtml(subtitle)}</p>
            </div>
            <button class="ghost-btn" data-action="reload">更新</button>
          </div>
        </header>
      `;
    }

    function messageHtml() {
      if (!state.message) return "";
      return `<div class="status-message">${escapeHtml(state.message)}</div>`;
    }

    function todayPageHtml() {
      const settings = getSettings();
      const dates = getDates();
      const dayStops = getDayStops();
      const nextStop = getNextStop(dayStops);
      const dailyNotice = getDailyNotice();
      const firstTime = dayStops[0]?.time || "--";
      const confirmedCount = dayStops.filter((stop) => stop.status === "確定").length;

      const nextBlock = nextStop ? `
        <section class="section next-card">
          <div class="next-card-inner">
            <div class="eyebrow">下一站</div>
            <h2 class="next-title">${escapeHtml(nextStop.title)}</h2>
            <div class="next-meta">
              <span class="pill primary">${escapeHtml(nextStop.time || "--:--")}${nextStop.endTime ? ` – ${escapeHtml(nextStop.endTime)}` : ""}</span>
              <span class="pill">${escapeHtml(nextStop.category)}</span>
              ${nextStop.duration ? `<span class="pill">${escapeHtml(nextStop.duration)}</span>` : ""}
            </div>
            ${nextStop.address ? `<div class="next-address">${escapeHtml(nextStop.address)}</div>` : ""}
            ${nextStop.transitNote ? `<div class="next-address">${escapeHtml(nextStop.transitNote)}</div>` : ""}
            <div class="action-grid">
              <a class="secondary-btn" href="${attr(buildMapsSearchUrl(nextStop))}" target="_blank" rel="noreferrer">查看地點</a>
              <a class="primary-btn" href="${attr(buildCurrentLocationDirectionsUrl(nextStop))}" target="_blank" rel="noreferrer">現在前往</a>
            </div>
          </div>
        </section>
      ` : `
        <section class="section next-card">
          <div class="next-card-inner">
            <div class="eyebrow">下一站</div>
            <h2 class="next-title">尚未設定行程</h2>
            <p class="next-address">選擇其他日期，或在雲端表格新增今日行程</p>
          </div>
        </section>
      `;

      return `
        ${topHtml(settings.tripTitle || "旅遊行程")}
        <div class="page content">
          ${messageHtml()}
          <section class="section hero">
            <div class="hero-main">
              <span class="date-label">${escapeHtml(formatLongDate(state.selectedDate))}</span>
              <h2>${escapeHtml(settings.tripTitle || "大阪・京都行程")}</h2>
              <p>${escapeHtml(settings.globalNotice || getTripRange(dates))}</p>
            </div>
            <div class="hero-stats">
              <div class="hero-stat"><strong>${escapeHtml(String(dayStops.length))}</strong><span>今日行程</span></div>
              <div class="hero-stat"><strong>${escapeHtml(String(confirmedCount))}</strong><span>確定</span></div>
              <div class="hero-stat"><strong>${escapeHtml(firstTime)}</strong><span>開始時間</span></div>
            </div>
          </section>

          ${nextBlock}

          ${dailyNotice ? `<section class="section notice">${escapeHtml(dailyNotice)}</section>` : ""}

          <div class="section-title">
            <h2>今日行程</h2>
            <span>${escapeHtml(formatDateLabel(state.selectedDate))}</span>
          </div>
          ${stopListHtml(dayStops)}
        </div>
      `;
    }

    function planPageHtml() {
      const dayStops = getDayStops();
      const dailyNotice = getDailyNotice();

      return `
        ${topHtml("全部行程")}
        <div class="page content">
          ${dateRailHtml()}
          ${messageHtml()}
          ${dailyNotice ? `<section class="section notice">${escapeHtml(dailyNotice)}</section>` : ""}
          <div class="section-title">
            <h2>${escapeHtml(formatLongDate(state.selectedDate))}</h2>
            <span>${escapeHtml(String(dayStops.length))} 個行程</span>
          </div>
          ${stopListHtml(dayStops)}
        </div>
      `;
    }

    function mapPageHtml() {
      const dayStops = getDayStops();
      if (state.selectedMapIndex >= dayStops.length) state.selectedMapIndex = 0;
      const mapStop = dayStops[state.selectedMapIndex] || dayStops[0];

      return `
        ${topHtml("地圖")}
        <div class="page content">
          ${dateRailHtml()}
          ${messageHtml()}
          <section class="section map-card">
            <div class="map-head">
              <div class="map-title">今日地圖</div>
              <p class="map-copy">點下方地點切換地圖，實際路線跟乘車時間以 Google Maps 即時計算為準</p>
            </div>
            ${mapStop ? `<iframe class="map-frame" title="Google Maps Preview" loading="lazy" src="${attr(buildEmbedMapUrl(mapStop))}"></iframe>` : `<div class="loading-overlay">這天還沒有可顯示的地點</div>`}
            <div class="map-stop-row">
              ${dayStops.map((stop, index) => `
                <button class="map-stop ${index === state.selectedMapIndex ? "active" : ""}" data-action="select-map-stop" data-index="${index}">
                  ${escapeHtml(stop.time || "--:--")}　${escapeHtml(stop.title)}
                </button>
              `).join("")}
            </div>
          </section>

          ${mapStop ? `
            <section class="section next-card">
              <div class="next-card-inner">
                <div class="eyebrow">目前地點</div>
                <h2 class="next-title">${escapeHtml(mapStop.title)}</h2>
                <div class="next-address">${escapeHtml(mapStop.address || "")}</div>
                <div class="action-grid">
                  <a class="secondary-btn" href="${attr(buildMapsSearchUrl(mapStop))}" target="_blank" rel="noreferrer">查看地點</a>
                  <a class="primary-btn" href="${attr(buildCurrentLocationDirectionsUrl(mapStop))}" target="_blank" rel="noreferrer">現在前往</a>
                </div>
              </div>
            </section>
          ` : ""}
        </div>
      `;
    }

    function infoPageHtml() {
      const hotels = getHotels();
      const emergencies = getEmergencies();

      return `
        ${topHtml("住宿")}
        <div class="page content">
          ${messageHtml()}
          <section class="section notice">
            成功載入後，行程會保留在手機快取，網路不穩時也可以查看上次儲存的資料
          </section>

          <div class="section-title">
            <h2>住宿資訊</h2>
            <span>${escapeHtml(String(hotels.length))} 筆</span>
          </div>

          <section class="stop-list">
            ${hotels.length ? hotels.map((hotel) => `
              <article class="info-card">
                <div class="info-title">住宿</div>
                <h3>${escapeHtml(hotel.hotelName || "未設定住宿名稱")}</h3>
                <p>${escapeHtml(hotel.hotelAddress || "未設定住宿地址")}</p>
                <div class="info-grid">
                  ${hotel.hotelCheckin ? `<div class="mini-row"><span>入住</span><span>${escapeHtml(hotel.hotelCheckin)}</span></div>` : ""}
                  ${hotel.hotelCheckout ? `<div class="mini-row"><span>退房</span><span>${escapeHtml(hotel.hotelCheckout)}</span></div>` : ""}
                </div>
                <div class="action-grid">
                  <a class="secondary-btn" href="${attr(buildMapsSearchUrl(hotel))}" target="_blank" rel="noreferrer">查看地點</a>
                  <a class="primary-btn" href="${attr(buildCurrentLocationDirectionsUrl(hotel))}" target="_blank" rel="noreferrer">現在前往</a>
                </div>
              </article>
            `).join("") : `
              <div class="empty">
                <strong>還沒有住宿資料</strong>
                在雲端表格新增住宿列後，這裡會自動顯示
              </div>
            `}
          </section>

          ${emergencies.length ? `
            <div class="section-title">
              <h2>緊急聯絡</h2>
              <span>${escapeHtml(String(emergencies.length))} 筆</span>
            </div>
            <section class="stop-list">
              ${emergencies.map((item) => `
                <article class="info-card">
                  <div class="info-title" style="color: var(--danger);">緊急聯絡</div>
                  <h3>${escapeHtml(item.emergencyName || "未設定名稱")}</h3>
                  <p>${escapeHtml(item.emergencyNote || "")}</p>
                  ${item.emergencyPhone ? `<a class="primary-btn" style="margin-top: 12px; background: var(--danger); border-color: var(--danger);" href="tel:${attr(item.emergencyPhone)}">撥打 ${escapeHtml(item.emergencyPhone)}</a>` : ""}
                </article>
              `).join("")}
            </section>
          ` : ""}
        </div>
      `;
    }

    function searchPageHtml() {
      const stops = getStops();
      const categories = ["全部", ...Array.from(new Set(stops.map((stop) => stop.category).filter(Boolean)))];
      const q = state.query.trim().toLowerCase();

      const searchedStops = stops.filter((stop) => {
        const matchCategory = state.category === "全部" || stop.category === state.category;
        const matchQuery = !q || Object.values(stop).join(" ").toLowerCase().includes(q);
        return matchCategory && matchQuery;
      });

      return `
        ${topHtml("搜尋")}
        <div class="page content">
          ${messageHtml()}
          <section class="section search-card">
            <input class="field" data-action="search-input" value="${attr(state.query)}" placeholder="輸入關鍵字，例如：餐廳、車站、住宿" />
            <div class="form-grid">
              <select class="field" data-action="category-select">
                ${categories.map((item) => `<option value="${attr(item)}" ${item === state.category ? "selected" : ""}>${escapeHtml(item)}</option>`).join("")}
              </select>
              <button class="secondary-btn" data-action="clear-search" type="button">清除</button>
            </div>
          </section>

          <div class="section-title">
            <h2>搜尋結果</h2>
            <span>${escapeHtml(String(searchedStops.length))} 個行程</span>
          </div>
          ${stopListHtml(searchedStops)}
        </div>
      `;
    }

    function navIconSvg(key) {
      if (key === "today") return `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"></rect><path d="M7 3.5v3"></path><path d="M17 3.5v3"></path><path d="M3.5 9.5h17"></path><path d="M9.2 14.2h.01"></path><path d="M12 14.2h.01"></path><path d="M14.8 14.2h.01"></path></svg>`;
      if (key === "plan") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12"></path><path d="M8 12h12"></path><path d="M8 18h12"></path><path d="M4.5 6h.01"></path><path d="M4.5 12h.01"></path><path d="M4.5 18h.01"></path></svg>`;
      if (key === "map") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5.5 15 3l5.5 2.5v13L15 21l-6-2.5L3.5 21v-13L9 5.5Z"></path><path d="M9 5.5v13"></path><path d="M15 3v18"></path><path d="M12 11.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2Z"></path></svg>`;
      if (key === "info") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 11.5V8.8A2.8 2.8 0 0 1 6.3 6h11.4a2.8 2.8 0 0 1 2.8 2.8v2.7"></path><path d="M3.5 11.5h17v5a1.5 1.5 0 0 1-1.5 1.5h-1.5v-3h-11v3H5A1.5 1.5 0 0 1 3.5 16.5v-5Z"></path><path d="M6.5 18v1.5"></path><path d="M17.5 18v1.5"></path></svg>`;
      return `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4.5 4.5"></path></svg>`;
    }

    function bottomNavHtml() {
      const items = [
        ["today", "今天"],
        ["plan", "行程"],
        ["map", "地圖"],
        ["info", "住宿"],
        ["search", "搜尋"]
      ];

      return `
        <nav class="bottom-nav">
          <div class="bottom-nav-inner">
            ${items.map(([key, label]) => `
              <button class="nav-btn ${state.screen === key ? "active" : ""}" data-action="set-screen" data-screen="${key}">
                <span class="nav-icon">${navIconSvg(key)}</span>
                <span class="nav-label">${label}</span>
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    function render() {
      ensureSelectedDate();

      if (state.loading && !state.rows.length) {
        app.innerHTML = `
          ${topHtml("旅遊行程")}
          <div class="page content">
            <div class="loading-overlay">正在讀取行程資料</div>
          </div>
          ${bottomNavHtml()}
        `;
        bindEvents();
        return;
      }

      let html = "";
      if (state.screen === "today") html = todayPageHtml();
      if (state.screen === "plan") html = planPageHtml();
      if (state.screen === "map") html = mapPageHtml();
      if (state.screen === "info") html = infoPageHtml();
      if (state.screen === "search") html = searchPageHtml();

      app.innerHTML = html + bottomNavHtml();
      bindEvents();
    }

    function bindEvents() {
      app.querySelectorAll("[data-action]").forEach((element) => {
        const action = element.dataset.action;

        if (action === "set-screen") {
          element.addEventListener("click", () => {
            state.screen = element.dataset.screen;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "select-date") {
          element.addEventListener("click", () => {
            state.selectedDate = element.dataset.date;
            state.selectedMapIndex = 0;
            render();
          });
        }

        if (action === "select-map-stop") {
          element.addEventListener("click", () => {
            state.selectedMapIndex = Number(element.dataset.index || 0);
            render();
          });
        }

        if (action === "reload") {
          element.addEventListener("click", () => loadRows(true));
        }

        if (action === "search-input") {
          element.addEventListener("input", (event) => {
            state.query = event.target.value;
            render();
            const input = app.querySelector("[data-action='search-input']");
            if (input) {
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
          });
        }

        if (action === "category-select") {
          element.addEventListener("change", (event) => {
            state.category = event.target.value;
            render();
          });
        }

        if (action === "clear-search") {
          element.addEventListener("click", () => {
            state.query = "";
            state.category = "全部";
            render();
          });
        }
      });
    }

    async function loadRows(force = false) {
      state.loading = true;
      state.message = force ? "正在更新最新行程資料" : "";
      render();

      try {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 12000);
        const url = force ? `${SHEET_CSV_URL}${SHEET_CSV_URL.includes("?") ? "&" : "?"}_=${Date.now()}` : SHEET_CSV_URL;

        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        window.clearTimeout(timeout);

        if (!response.ok) throw new Error("資料讀取失敗");

        const text = await response.text();
        const parsed = parseCSV(text);
        if (!parsed.length) throw new Error("雲端表格沒有可讀資料");

        state.rows = parsed;
        localStorage.setItem("trip-html:lastRows", JSON.stringify(parsed));
        state.message = force ? "行程已更新" : "";
      } catch (error) {
        const cached = localStorage.getItem("trip-html:lastRows");
        if (cached) {
          state.rows = JSON.parse(cached).map(normalizeRow);
          state.message = "目前顯示上次儲存的行程";
        } else {
          state.rows = SAMPLE_ROWS;
          state.message = "目前暫時顯示內建行程，雲端資料連線後會自動更新";
        }
      } finally {
        state.loading = false;
        ensureSelectedDate();
        render();

        if (state.message === "行程已更新") {
          setTimeout(() => {
            if (state.message === "行程已更新") {
              state.message = "";
              render();
            }
          }, 1800);
        }
      }
    }

    render();
    loadRows(false);
  </script>
</body>
</html>
