<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>大阪・京都行程</title>
  <!-- UI version: timeline + white iOS layout -->
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --line: #e5e7eb;
      --line-soft: #f1f5f9;
      --primary: #2f80a8;
      --primary-dark: #1f5f7e;
      --primary-soft: #e7f4f8;
      --warning: #f59e0b;
      --warning-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.07);
      --shadow-soft: 0 8px 22px rgba(15, 23, 42, 0.05);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 0 0 calc(78px + var(--safe-bottom));
      background: var(--bg);
    }

    .page {
      min-height: calc(100dvh - 78px);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .trip-title {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .trip-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.5;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
    }

    .ghost-btn:active,
    .primary-btn:active,
    .secondary-btn:active,
    .date-chip:active,
    .nav-btn:active,
    .card-button:active {
      transform: scale(0.985);
    }

    .content {
      padding: 14px 18px 0;
    }

    .section {
      margin: 0 0 14px;
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.01em;
    }

    .section-title span {
      color: var(--light);
      font-size: 12px;
      font-weight: 800;
    }

    .section-title-group {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .section-title .mini-action {
      flex: 0 0 auto;
      padding: 8px 11px;
      font-size: 11.5px;
      white-space: nowrap;
    }

    .hero {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
      box-shadow: var(--shadow);
    }

    .hero-main {
      padding: 18px;
    }

    .date-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .hero h2 {
      margin: 14px 0 0;
      font-size: 28px;
      font-weight: 950;
      line-height: 1.12;
      letter-spacing: -0.045em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.65;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--line-soft);
      background: #fff;
    }

    .hero-stat {
      padding: 13px 10px;
      text-align: center;
      border-right: 1px solid var(--line-soft);
    }

    .hero-stat:last-child {
      border-right: 0;
    }

    .hero-stat strong {
      display: block;
      font-size: 18px;
      font-weight: 950;
    }

    .hero-stat span {
      display: block;
      margin-top: 2px;
      color: var(--light);
      font-size: 10px;
      font-weight: 950;
    }

    .next-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(47, 128, 168, 0.15);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(47, 128, 168, 0.10), rgba(255,255,255,0.0) 55%),
        #fff;
      box-shadow: var(--shadow);
    }

    .next-card-inner {
      padding: 16px;
    }

    .eyebrow {
      color: var(--primary);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.08em;
    }

    .next-title {
      margin: 8px 0 0;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .next-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 26px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
    }

    .pill.primary {
      border-color: rgba(47, 128, 168, 0.15);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .pill.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .next-address {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .primary-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 950;
      transition: transform 0.16s ease;
    }

    .primary-btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .secondary-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .notice {
      border: 1px solid rgba(47, 128, 168, 0.12);
      border-radius: var(--radius-lg);
      background: var(--primary-soft);
      padding: 12px 13px;
      color: #1f5f7e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.65;
    }

    .notice.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .status-message {
      margin: 0 0 12px;
      border: 1px solid rgba(245, 158, 11, 0.20);
      border-radius: var(--radius-md);
      background: var(--warning-soft);
      padding: 10px 12px;
      color: #92400e;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.55;
    }

    .date-rail {
      position: sticky;
      top: 75px;
      z-index: 25;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -18px 12px;
      padding: 8px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    .date-rail::-webkit-scrollbar,
    .map-stop-row::-webkit-scrollbar {
      display: none;
    }

    .date-chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      transition: transform 0.16s ease;
    }

    .date-chip.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .stop-list {
      display: grid;
      gap: 12px;
    }

    .today-list {
      display: grid;
      gap: 0;
      background: #fff;
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
    }

    .today-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      background: #fff;
    }

    .today-item:not(:last-child) {
      border-bottom: 1px solid var(--line-soft);
    }

    .today-item .thumb {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      border-radius: 14px;
      box-shadow: none;
    }

    .today-item .thumb-placeholder svg {
      width: 30px;
      height: 30px;
    }

    .today-item .thumb-time {
      top: 5px;
      left: 5px;
      padding: 3px 5px;
      font-size: 8.5px;
      background: rgba(17, 24, 39, 0.56);
    }

    .today-item .thumb-icon {
      right: 5px;
      bottom: 5px;
      width: 22px;
      height: 22px;
      font-size: 9.5px;
      box-shadow: none;
    }

    .today-body {
      min-width: 0;
      flex: 1;
      padding-right: 4px;
    }

    .today-title {
      margin: 0;
      display: -webkit-box;
      overflow: hidden;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: -0.01em;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .today-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
      color: var(--light);
      font-size: 11px;
      font-weight: 850;
      line-height: 1.2;
    }

    .today-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .today-address {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.45;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .today-alert {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 6px;
      color: #92400e;
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1.35;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .today-item,
    .timeline-item {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .today-item:active,
    .timeline-item:active {
      opacity: 0.72;
    }

    .today-tail {
      display: grid;
      place-items: center;
      width: 18px;
      color: var(--light);
      font-size: 20px;
      font-weight: 500;
    }

    .favorite-thumb .thumb-icon {
      right: 5px;
      bottom: 5px;
    }

    .detail-hero {
      overflow: hidden;
      border-bottom: 1px solid var(--line-soft);
      background: #fff;
    }

    .detail-image {
      position: relative;
      height: 210px;
      overflow: hidden;
      background: #eef2f6;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-image .thumb-placeholder svg {
      width: 76px;
      height: 76px;
    }

    .detail-body {
      padding: 16px 18px 22px;
      background: #fff;
    }

    .detail-top-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .back-btn,
    .favorite-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .favorite-btn.active {
      border-color: rgba(47, 128, 168, 0.22);
      background: rgba(47, 128, 168, 0.1);
      color: var(--primary);
    }

    .detail-title {
      margin: 0;
      color: var(--text);
      font-size: 26px;
      font-weight: 950;
      letter-spacing: -0.03em;
      line-height: 1.12;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .detail-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line-soft);
    }

    .detail-label {
      margin-bottom: 7px;
      color: var(--light);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.05em;
    }

    .detail-text {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.7;
      word-break: break-word;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .favorite-empty {
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      background: #fff;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.65;
    }

    .favorite-empty strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 5px;
    }

    .timeline-list {
      display: grid;
      gap: 0;
      margin-top: 2px;
      background: #fff;
    }

    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: 50px 24px 1fr;
      gap: 9px;
      align-items: start;
      min-height: 72px;
    }

    .timeline-item:not(:last-child) {
      padding-bottom: 10px;
    }

    .timeline-time {
      padding-top: 4px;
      text-align: right;
    }

    .timeline-time strong {
      display: block;
      color: var(--text);
      font-size: 11.5px;
      font-weight: 950;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .timeline-time span {
      display: block;
      margin-top: 3px;
      color: var(--light);
      font-size: 9px;
      font-weight: 850;
      line-height: 1.15;
    }

    .timeline-node {
      position: relative;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      margin-top: 3px;
      border: 2px solid #dbeef5;
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      font-size: 8.8px;
      font-weight: 950;
      box-shadow: 0 0 0 4px #fff;
      z-index: 2;
    }

    .timeline-item:not(:last-child) .timeline-node::after {
      content: "";
      position: absolute;
      top: 22px;
      left: 50%;
      width: 1px;
      height: calc(100% + 52px);
      transform: translateX(-50%);
      background: #d9edf4;
      z-index: -1;
    }

    .timeline-card {
      display: block;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 2px 0 10px;
      box-shadow: none;
    }

    .timeline-content {
      min-width: 0;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 12px;
    }

    .timeline-item:last-child .timeline-content {
      border-bottom: 0;
    }

    .timeline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 5px;
      color: var(--light);
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.25;
    }

    .timeline-meta span {
      display: inline-flex;
      align-items: center;
    }

    .timeline-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1.32;
    }

    .timeline-address {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.45;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .timeline-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.5;
    }

    .timeline-note.warning {
      color: #92400e;
      font-weight: 800;
    }

    .timeline-actions {
      display: none;
    }

    .timeline-thumb {
      position: relative;
      width: 70px;
      height: 70px;
      overflow: hidden;
      border-radius: 15px;
      background: #eef2f6;
      align-self: start;
    }

    .timeline-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .timeline-thumb .thumb-placeholder svg {
      width: 34px;
      height: 34px;
    }

    .stop-card {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .stop-main {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .thumb {
      position: relative;
      flex: 0 0 96px;
      width: 96px;
      height: 96px;
      overflow: hidden;
      border-radius: 19px;
      background: #eef2f6;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.68);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.76), transparent 28%),
        linear-gradient(145deg, var(--thumb-a), var(--thumb-b) 54%, var(--thumb-c));
    }

    .thumb-placeholder::before {
      content: "";
      position: absolute;
      inset: 9px;
      z-index: -1;
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 15px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 42%),
        radial-gradient(circle at 18% 84%, rgba(255, 255, 255, 0.3), transparent 24%);
    }

    .thumb-placeholder::after {
      content: "";
      position: absolute;
      right: -18px;
      bottom: -18px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    .thumb-placeholder svg {
      width: 46px;
      height: 46px;
      color: rgba(255, 255, 255, 0.92);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.65;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.18));
    }

    .thumb-placeholder.scene {
      --thumb-a: #7cc7d9;
      --thumb-b: #4e9ab9;
      --thumb-c: #224f70;
    }

    .thumb-placeholder.food {
      --thumb-a: #f3b37f;
      --thumb-b: #e98248;
      --thumb-c: #8f4429;
    }

    .thumb-placeholder.transport {
      --thumb-a: #90d6e7;
      --thumb-b: #36a4c0;
      --thumb-c: #1d5d7d;
    }

    .thumb-placeholder.shopping {
      --thumb-a: #b7a8f4;
      --thumb-b: #8067d7;
      --thumb-c: #423083;
    }

    .thumb-placeholder.hotel {
      --thumb-a: #adc7ef;
      --thumb-b: #648fd7;
      --thumb-c: #36598b;
    }

    .thumb-placeholder.backup {
      --thumb-a: #cbd5e1;
      --thumb-b: #94a3b8;
      --thumb-c: #475569;
    }

    .thumb-time {
      position: absolute;
      top: 8px;
      left: 8px;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.68);
      color: #fff;
      font-size: 10px;
      font-weight: 950;
      backdrop-filter: blur(10px);
    }

    .thumb-icon {
      position: absolute;
      right: 8px;
      bottom: 8px;
      display: grid;
      place-items: center;
      width: 29px;
      height: 29px;
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      font-size: 12px;
      font-weight: 950;
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.15);
    }

    .stop-body {
      min-width: 0;
      flex: 1;
    }

    .badge-row {

    const FAVORITE_STORAGE_KEY = "trip-html:favorites-v1";

    const state = {
      rows: getInitialRows(),
      screen: "today",
      previousScreen: "today",
      selectedDate: "",
      selectedMapIndex: 0,
      selectedStopId: "",
      selectedFavoriteId: "",
      formMode: "",
      formType: "",
      formId: "",
      favorites: getStoredFavoriteIds(),
      loading: true,
      message: "",
      query: "",
      category: "全部"
    };

    const app = document.getElementById("app");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function attr(value) {
      return escapeHtml(value);
    }

    function getStoredFavoriteIds() {
      try {
        const raw = localStorage.getItem(FAVORITE_STORAGE_KEY);
        const parsed = JSON.parse(raw || "[]");
        return Array.isArray(parsed) ? parsed.filter(Boolean) : [];
      } catch (error) {
        return [];
      }
    }

    function saveFavoriteIds() {
      localStorage.setItem(FAVORITE_STORAGE_KEY, JSON.stringify(state.favorites));
    }

    function stopId(stop) {
      if (stop.id) return stop.id;
      return [stop.date || "", String(stop.order || ""), stop.time || "", stop.title || ""]
        .join("__")
        .replace(/\s+/g, "_");
    }

    function findStopById(id) {
      return getStops().find((stop) => stopId(stop) === id) || null;
    }

    function isFavoriteStop(stop) {
      return state.favorites.includes(stopId(stop));
    }

    function toggleFavorite(id) {
      if (!id) return;
      const exists = state.favorites.includes(id);
      state.favorites = exists
        ? state.favorites.filter((item) => item !== id)
        : [...state.favorites, id];
      saveFavoriteIds();
    }

    function normalizeFieldName(key) {
      const trimmed = String(key || "").trim();
      return FIELD_ALIASES[trimmed] || trimmed;
    }

    function normalizeTypeValue(value) {
      const trimmed = String(value || "").trim();
      return TYPE_ALIASES[trimmed] || trimmed;
    }

    function normalizeVisibleValue(value) {
      const trimmed = String(value || "").trim();
      const upper = trimmed.toUpperCase();
      if (["FALSE", "0", "否", "隱藏", "不顯示", "關閉", "NO"].includes(upper) || ["否", "隱藏", "不顯示", "關閉"].includes(trimmed)) return "FALSE";
      if (["TRUE", "1", "是", "顯示", "開啟", "YES"].includes(upper) || ["是", "顯示", "開啟"].includes(trimmed)) return "TRUE";
      return trimmed || "TRUE";
    }

    function normalizeRow(row) {
      const out = {};
      Object.entries(row || {}).forEach(([key, value]) => {
        out[normalizeFieldName(key)] = String(value ?? "").trim();
      });
      if (out.type) out.type = normalizeTypeValue(out.type);
      if (out.visible) out.visible = normalizeVisibleValue(out.visible);
      return out;
    }

    function isVisible(row) {
      return normalizeVisibleValue(row.visible || "TRUE") !== "FALSE";
    }

    function parseCSV(text) {
      const rows = [];
      let current = "";
      let row = [];
      let insideQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(current);
          current = "";
          if (row.some((cell) => cell.trim() !== "")) rows.push(row);
          row = [];
        } else {
          current += char;
        }
      }

      row.push(current);
      if (row.some((cell) => cell.trim() !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = rows[0].map(normalizeFieldName);
      return rows.slice(1).map((cells) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = String(cells[index] ?? "").trim();
        });
        return normalizeRow(item);
      });
    }

    function getInitialRows() {
      try {
        const cached = localStorage.getItem("trip-html:google-sheet-live-v1");
        if (cached) {
          const parsed = JSON.parse(cached);
          if (Array.isArray(parsed) && parsed.length) return parsed.map(normalizeRow);
        }
      } catch (error) {}
      return SAMPLE_ROWS;
    }

    function getNormalizedRows() {
      return state.rows.map(normalizeRow);
    }

    function getStops() {
      return getNormalizedRows()
        .filter((row) => row.type === "itinerary" && isVisible(row))
        .map((row, index) => ({
          id: row.id || "",
          type: "itinerary",
          date: row.date || "",
          order: Number(row.order || index + 1),
          time: row.time || "",
          endTime: row.endTime || "",
          title: row.title || "未設定行程",
          category: row.category || "景點",
          area: row.area || "",
          address: row.address || "",
          mapUrl: row.mapUrl || "",
          lat: row.lat || "",
          lng: row.lng || "",
          duration: row.duration || "",
          transitNote: row.transitNote || "",
          notice: row.notice || "",
          status: row.status || "",
          visible: row.visible || "TRUE",
          priority: row.priority || "",
          imageUrl: row.imageUrl || "",
          updatedAt: row.updatedAt || ""
        }))
        .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time) || a.order - b.order);
    }

    function favoriteId(place) {
      if (place.id) return place.id;
      return [place.title || "", place.area || "", place.category || "", place.address || ""]
        .join("__")
        .replace(/\s+/g, "_");
    }

    function getFavoritePlaces() {
      return getNormalizedRows()
        .filter((row) => row.type === "favorite" && isVisible(row))
        .map((row) => ({
          id: row.id || "",
          type: "favorite",
          title: row.title || "未設定地點",
          category: row.category || "景點",
          area: row.area || "",
          address: row.address || "",
          mapUrl: row.mapUrl || "",
          lat: row.lat || "",
          lng: row.lng || "",
          notice: row.notice || "",
          priority: row.priority || "",
          imageUrl: row.imageUrl || "",
          visible: row.visible || "TRUE",
          updatedAt: row.updatedAt || ""
        }));
    }

    function findFavoriteById(id) {
      return getFavoritePlaces().find((place) => favoriteId(place) === id) || null;
    }

    function getDates() {
      return Array.from(new Set(getStops().map((stop) => stop.date).filter(Boolean)));
    }

    function getSettings() {
      const row = getNormalizedRows().find((item) => item.type === "settings") || {};
      return {
        ...row,
        tripTitle: row.tripTitle || row.title || "旅遊行程",
        tripSubtitle: row.tripSubtitle || "",
        globalNotice: row.globalNotice || row.notice || ""
      };
    }

    function getHotels() {
      return getNormalizedRows()
        .filter((row) => row.type === "hotel" && isVisible(row))
        .map((row) => ({
          type: "hotel",
          hotelName: row.hotelName || row.title || "未設定住宿名稱",
          hotelAddress: row.hotelAddress || row.address || "",
          hotelCheckin: row.hotelCheckin || "",
          hotelCheckout: row.hotelCheckout || "",
          hotelMapUrl: row.hotelMapUrl || row.mapUrl || "",
          notice: row.notice || "",
          visible: row.visible || "TRUE"
        }));
    }

    function getEmergencies() {
      return getNormalizedRows().filter((row) => row.type === "emergency" && isVisible(row));
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDateLabel(dateString) {
      if (!dateString) return "未設定日期";
      const date = new Date(`${dateString}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString("zh-TW", { month: "numeric", day: "numeric", weekday: "short" });
    }

    function formatLongDate(dateString) {
      if (!dateString) return "未設定日期";
      const date = new Date(`${dateString}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    }

    function getTripRange(dates) {
      if (!dates.length) return "尚未設定日期";
      if (dates.length === 1) return formatLongDate(dates[0]);
      return `${formatDateLabel(dates[0])} – ${formatDateLabel(dates[dates.length - 1])}`;
    }

    function toMinutes(time) {
      if (!/^\d{1,2}:\d{2}$/.test(time || "")) return null;
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function ensureSelectedDate() {
      const dates = getDates();
      if (!dates.length) {
        state.selectedDate = "";
        return;
      }

      if (state.selectedDate && dates.includes(state.selectedDate)) return;

      const today = todayISO();
      state.selectedDate = dates.find((date) => date >= today) || dates[0];
    }

    function getDayStops() {
      return getStops().filter((stop) => stop.date === state.selectedDate);
    }

    function getNextStop(dayStops) {
      if (!dayStops.length) return null;
      if (state.selectedDate !== todayISO()) return dayStops[0];

      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();

      return dayStops.find((stop) => {
        const minutes = toMinutes(stop.time);
        return minutes !== null && minutes >= current;
      }) || dayStops[dayStops.length - 1];
    }

    function getDailyNotice() {
      const row = getNormalizedRows().find((item) => item.type === "daily_notice" && item.date === state.selectedDate && isVisible(item));
      return row?.dailyNotice || row?.notice || "";
    }

    function getDestinationQuery(place) {
      if ("lat" in place && place.lat && place.lng) return `${place.lat},${place.lng}`;
      if ("address" in place) return place.address || place.title;
      return place.hotelAddress || place.hotelName;
    }

    function buildMapsSearchUrl(place) {
      if ("mapUrl" in place && place.mapUrl) return place.mapUrl;
      if ("hotelMapUrl" in place && place.hotelMapUrl) return place.hotelMapUrl;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(getDestinationQuery(place))}`;
    }

    function buildCurrentLocationDirectionsUrl(place) {
      const params = new URLSearchParams();
      params.set("destination", getDestinationQuery(place));
      params.set("travelmode", "transit");
      return `https://www.google.com/maps/dir/?api=1&${params.toString()}`;
    }

    function buildEmbedMapUrl(place) {
      return `https://maps.google.com/maps?q=${encodeURIComponent(getDestinationQuery(place))}&z=14&output=embed`;
    }

    function categoryIcon(category) {
      if (category === "交通" || category === "車站") return "↗";
      if (category === "餐廳") return "食";
      if (category === "購物") return "買";
      if (category === "住宿") return "宿";
      if (category === "備用") return "+";
      return "景";
    }

    function categoryKey(category) {
      if (category === "交通" || category === "車站") return "transport";
      if (category === "餐廳") return "food";
      if (category === "購物") return "shopping";
      if (category === "住宿") return "hotel";
      if (category === "備用") return "backup";
      return "scene";
    }

    function placeholderSvg(category) {
      const key = categoryKey(category);
      if (key === "transport") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 34c6-13 18-20 27-23"></path><path d="M10 35h8"></path><path d="M31 13h8"></path><circle cx="14" cy="34" r="3.5"></circle><circle cx="34" cy="14" r="3.5"></circle><path d="M20 28h8"></path><path d="M24 24v8"></path></svg>`;
      if (key === "food") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M13 28h22"></path><path d="M16 28c0 6 4 10 8 10s8-4 8-10"></path><path d="M18 18c0-3 2-4 2-6"></path><path d="M25 18c0-3 2-4 2-6"></path><path d="M33 13v25"></path><path d="M37 13v25"></path></svg>`;
      if (key === "shopping") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M14 19h20l-2 19H16L14 19Z"></path><path d="M19 19c0-5 2-8 5-8s5 3 5 8"></path><path d="M20 28h8"></path></svg>`;
      if (key === "hotel") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 30h25"></path><path d="M12 15v23"></path><path d="M37 24v14"></path><path d="M12 24h13v6H12z"></path><path d="M25 22h7c3 0 5 2 5 5v3"></path></svg>`;
      if (key === "backup") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 12v24"></path><path d="M12 24h24"></path><circle cx="24" cy="24" r="16"></circle></svg>`;
      return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M9 34 19 22l7 8 5-6 8 10"></path><path d="M13 34h26"></path><circle cx="32" cy="16" r="4"></circle><path d="M17 36c6 3 13 3 20 0"></path></svg>`;
    }

    function placeholderHtml(category, hidden = false) {
      const key = categoryKey(category);
      return `<div class="thumb-placeholder ${key}${hidden ? " hidden" : ""}">${placeholderSvg(category)}</div>`;
    }

    function badgeClass(value) {
      if (value === "交通" || value === "車站") return "transport";
      if (value === "餐廳") return "food";
      if (value === "購物") return "shopping";
      if (value === "住宿") return "hotel";
      if (value === "確定") return "confirmed";
      return "";
    }

    function thumbnailHtml(stop) {
      const time = stop.time || "--:--";
      const icon = categoryIcon(stop.category);
      const fallback = placeholderHtml(stop.category, Boolean(stop.imageUrl));
      const img = stop.imageUrl
        ? `<img src="${attr(stop.imageUrl)}" alt="${attr(stop.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />${fallback}`
        : fallback;

      return `
        <div class="thumb">
          ${img}
          <span class="thumb-time">${escapeHtml(time)}</span>
          <span class="thumb-icon">${escapeHtml(icon)}</span>
        </div>
      `;
    }

    function stopCardHtml(stop) {
      const title = escapeHtml(stop.title);
      const time = `${stop.time || "--:--"}${stop.endTime ? ` – ${stop.endTime}` : ""}`;
      const categoryBadge = `<span class="badge ${badgeClass(stop.category)}">${escapeHtml(stop.category)}</span>`;
      const statusBadge = stop.status ? `<span class="badge ${badgeClass(stop.status)}">${escapeHtml(stop.status)}</span>` : "";
      const durationBadge = stop.duration ? `<span class="badge">${escapeHtml(stop.duration)}</span>` : "";
      const address = stop.address ? `<div class="stop-address">${escapeHtml(stop.address)}</div>` : "";
      const transit = stop.transitNote ? `<div class="stop-note">${escapeHtml(stop.transitNote)}</div>` : "";
      const notice = stop.notice ? `<div class="stop-note warning">${escapeHtml(stop.notice)}</div>` : "";

      return `
        <article class="stop-card">
          <div class="stop-main">
            ${thumbnailHtml(stop)}
            <div class="stop-body">
              <div class="badge-row">${categoryBadge}${statusBadge}${durationBadge}</div>
              <h3 class="stop-title">${title}</h3>
              <div class="stop-time">${escapeHtml(time)}</div>
              ${address}
            </div>
          </div>
          ${transit}
          ${notice}
          <div class="stop-actions">
            <a class="card-button outline" href="${attr(buildMapsSearchUrl(stop))}" target="_blank" rel="noreferrer">查看地點</a>
            <a class="card-button filled" href="${attr(buildCurrentLocationDirectionsUrl(stop))}" target="_blank" rel="noreferrer">現在前往</a>
          </div>
        </article>
      `;
    }

    function timelineThumbnailHtml(stop) {
      const fallback = placeholderHtml(stop.category, Boolean(stop.imageUrl));
      const img = stop.imageUrl
        ? `<img src="${attr(stop.imageUrl)}" alt="${attr(stop.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />${fallback}`
        : fallback;

      return `<div class="timeline-thumb">${img}</div>`;
    }

    function timelineStopHtml(stop) {
      const id = stopId(stop);
      const time = stop.time || "--:--";
      const endTime = stop.endTime || "";
      const category = stop.category || "景點";
      const categoryClass = badgeClass(category);
      const duration = stop.duration ? `<span>${escapeHtml(stop.duration)}</span>` : "";
      const status = stop.status ? `<span>${escapeHtml(stop.status)}</span>` : "";
      const address = stop.address ? `<div class="timeline-address">${escapeHtml(stop.address)}</div>` : "";
      const transit = stop.transitNote ? `<div class="timeline-note">${escapeHtml(stop.transitNote)}</div>` : "";

    function isWriteReady() {
      return Boolean(WRITE_WEB_APP_URL && WRITE_WEB_APP_URL.trim());
    }

    function actionPayload(action, data) {
      return {
        token: WRITE_TOKEN,
        action,
        data
      };
    }

    function normalizeWriteData(raw) {
      return {
        ID: raw.id || raw.ID || "",
        類型: raw.type || "行程",
        日期: raw.date || "",
        開始時間: raw.time || "",
        結束時間: raw.endTime || "",
        標題: raw.title || "",
        分類: raw.category || "景點",
        區域: raw.area || "",
        地址: raw.address || "",
        備註: raw.notice || "",
        圖片連結: raw.imageUrl || "",
        重要度: raw.priority || ""
      };
    }

    async function sendWrite(action, data) {
      if (!isWriteReady()) {
        state.message = "尚未設定 Google Apps Script 寫入端";
        render();
        return;
      }

      state.message = "正在送出變更";
      render();

      const payload = actionPayload(action, normalizeWriteData(data));

      try {
        await fetch(WRITE_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        state.message = "已送出，稍後同步最新資料";
        state.screen = data.類型 === "收藏" || data.type === "收藏" ? "favorites" : "today";
        state.selectedStopId = "";
        state.selectedFavoriteId = "";
        state.formMode = "";
        state.formType = "";
        state.formId = "";
        render();

        window.setTimeout(() => loadRows(true), 1800);
      } catch (error) {
        state.message = "送出失敗，請檢查網路或 Apps Script 設定";
        render();
      }
    }

      state.previousScreen = state.screen;

          : `新增${state.formType}`;

      const type = isConvert ? "行程" : state.formType || "行程";
      const submitLabel = isEdit ? "儲存修改" : isConvert ? "加入行程" : "新增";

      return `
        ${topHtml(title)}
        <div class="page content">
          ${messageHtml()}
          <section class="form-card">
            <p class="form-help">
              ${isFavorite ? "收藏不用填日期跟時間；正式排入行程時再補日期、開始時間跟結束時間" : "行程建議填日期、開始時間跟結束時間，今天頁跟時間軸才會正常排序"}
            </p>

            <form class="form-grid-full" data-action="submit-form">
              <input type="hidden" name="id" value="${formValue(item, "id")}">
              <input type="hidden" name="type" value="${attr(type)}">
              <div class="form-row-2">
                <label class="form-label">日期
                  <input class="form-field" name="date" type="date" value="${formValue(item, "date")}">
                </label>
                <label class="form-label">分類
                  <select class="form-select" name="category">
                    ${["景點","餐廳","交通","購物","住宿","備用"].map((cat) => `<option value="${cat}" ${(item.category || "景點") === cat ? "selected" : ""}>${cat}</option>`).join("")}
                  </select>
                </label>
              </div>

              <div class="form-row-2">
                <label class="form-label">開始時間
                  <input class="form-field" name="time" type="time" value="${formValue(item, "time")}">
                </label>
                <label class="form-label">結束時間
                  <input class="form-field" name="endTime" type="time" value="${formValue(item, "endTime")}">
                </label>
              </div>

              <label class="form-label">標題
                <input class="form-field" name="title" value="${formValue(item, "title")}" placeholder="例如：心齋橋筋商店街" required>
              </label>

              <label class="form-label">區域
                <input class="form-field" name="area" value="${formValue(item, "area")}" placeholder="例如：梅田、心齋橋、河原町">
              </label>

              <label class="form-label">地址
                <input class="form-field" name="address" value="${formValue(item, "address")}" placeholder="Google Maps 可搜尋的地址或店名">
              </label>

              <label class="form-label">備註
                <textarea class="form-textarea" name="notice" placeholder="交通、提醒、備案理由都寫這裡">${escapeHtml(item.notice || item.transitNote || "")}</textarea>
              </label>

              <label class="form-label">圖片連結
                <input class="form-field" name="imageUrl" value="${formValue(item, "imageUrl")}" placeholder="可空白">
              </label>

              <label class="form-label">重要度
                <select class="form-select" name="priority">
                  ${["","高","中","低"].map((level) => `<option value="${level}" ${(item.priority || "") === level ? "selected" : ""}>${level || "不設定"}</option>`).join("")}
                </select>
              </label>

              <div class="form-actions">
                <button class="secondary-btn" data-action="cancel-form" type="button">取消</button>
                <button class="primary-btn" type="submit">${submitLabel}</button>
              </div>
            </form>
          </section>
        </div>
      `;
    }

    function navIconSvg(key) {
      if (key === "today") return `<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"></rect><path d="M7 3.5v3"></path><path d="M17 3.5v3"></path><path d="M3.5 9.5h17"></path><path d="M9.2 14.2h.01"></path><path d="M12 14.2h.01"></path><path d="M14.8 14.2h.01"></path></svg>`;
      if (key === "plan") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h12"></path><path d="M8 12h12"></path><path d="M8 18h12"></path><path d="M4.5 6h.01"></path><path d="M4.5 12h.01"></path><path d="M4.5 18h.01"></path></svg>`;
      if (key === "map") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5.5 15 3l5.5 2.5v13L15 21l-6-2.5L3.5 21v-13L9 5.5Z"></path><path d="M9 5.5v13"></path><path d="M15 3v18"></path><path d="M12 11.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2Z"></path></svg>`;
      if (key === "info") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 11.5V8.8A2.8 2.8 0 0 1 6.3 6h11.4a2.8 2.8 0 0 1 2.8 2.8v2.7"></path><path d="M3.5 11.5h17v5a1.5 1.5 0 0 1-1.5 1.5h-1.5v-3h-11v3H5A1.5 1.5 0 0 1 3.5 16.5v-5Z"></path><path d="M6.5 18v1.5"></path><path d="M17.5 18v1.5"></path></svg>`;
      if (key === "favorites") return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20.5s-7.5-4.4-7.5-10.1A4.2 4.2 0 0 1 12 7.8a4.2 4.2 0 0 1 7.5 2.6c0 5.7-7.5 10.1-7.5 10.1Z"></path></svg>`;
      return `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="6.5"></circle><path d="m16 16 4.5 4.5"></path></svg>`;
    }

    function bottomNavHtml() {
      const items = [
        ["today", "今天"],
        ["plan", "行程"],
        ["map", "地圖"],
        ["info", "住宿"],
        ["favorites", "收藏"]
      ];

      return `
        <nav class="bottom-nav">
          <div class="bottom-nav-inner">
            ${items.map(([key, label]) => `
              <button class="nav-btn ${state.screen === key ? "active" : ""}" data-action="set-screen" data-screen="${key}">
                <span class="nav-icon">${navIconSvg(key)}</span>
                <span class="nav-label">${label}</span>
              </button>
            `).join("")}
          </div>
        </nav>
      `;
    }

    function render() {
      ensureSelectedDate();

      if (state.loading && !state.rows.length) {
        app.innerHTML = `
          ${topHtml("旅遊行程")}
          <div class="page content">
            <div class="loading-overlay">正在讀取行程資料</div>
          </div>
          ${bottomNavHtml()}
        `;
        bindEvents();
        return;
      }

      let html = "";
      if (state.screen === "today") html = todayPageHtml();
      if (state.screen === "plan") html = planPageHtml();
      if (state.screen === "map") html = mapPageHtml();
      if (state.screen === "info") html = infoPageHtml();
      if (state.screen === "favorites") html = favoritesPageHtml();
      if (state.screen === "detail") html = detailPageHtml();
      if (state.screen === "favorite-detail") html = favoritePlaceDetailPageHtml();
      if (state.screen === "form") html = formPageHtml();

      app.innerHTML = html + (["detail", "favorite-detail", "form"].includes(state.screen) ? "" : bottomNavHtml());
      bindEvents();
    }

    function bindEvents() {
      app.querySelectorAll("[data-action]").forEach((element) => {
        const action = element.dataset.action;

        if (action === "set-screen") {
          element.addEventListener("click", () => {
            state.previousScreen = element.dataset.screen;
            state.screen = element.dataset.screen;
            state.selectedStopId = "";
            state.selectedFavoriteId = "";
            state.formMode = "";
            state.formType = "";
            state.formId = "";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "select-date") {
          element.addEventListener("click", () => {
            state.selectedDate = element.dataset.date;
            state.selectedMapIndex = 0;
            render();
          });
        }

        if (action === "select-map-stop") {
          element.addEventListener("click", () => {
            state.selectedMapIndex = Number(element.dataset.index || 0);
            render();
          });
        }

        if (action === "reload") {
          element.addEventListener("click", () => loadRows(true));
        }

        if (action === "search-input") {
          element.addEventListener("input", (event) => {
            state.query = event.target.value;
            render();
            const input = app.querySelector("[data-action='search-input']");
            if (input) {
              input.focus();
              input.setSelectionRange(input.value.length, input.value.length);
            }
          });
        }

        if (action === "category-select") {
          element.addEventListener("change", (event) => {
            state.category = event.target.value;
            render();
          });
        }

        if (action === "clear-search") {
          element.addEventListener("click", () => {
            state.query = "";
            state.category = "全部";
            render();
          });
        }
        if (action === "open-stop") {
          element.addEventListener("click", () => {
            state.previousScreen = state.screen === "detail" ? state.previousScreen : state.screen;
            state.selectedStopId = element.dataset.stopId || "";
            state.selectedFavoriteId = "";
            state.screen = "detail";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "open-favorite") {
          element.addEventListener("click", () => {
            state.previousScreen = state.screen === "favorite-detail" ? state.previousScreen : state.screen;
            state.selectedFavoriteId = element.dataset.favoriteId || "";
            state.selectedStopId = "";
            state.screen = "favorite-detail";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "add-itinerary") {
          element.addEventListener("click", () => openForm("create", "行程"));
        }

        if (action === "add-favorite") {
          element.addEventListener("click", () => openForm("create", "收藏"));
        }

        if (action === "edit-itinerary") {
          element.addEventListener("click", () => openForm("edit", "行程", element.dataset.stopId || state.selectedStopId));
        }

        if (action === "edit-favorite") {
          element.addEventListener("click", () => openForm("edit", "收藏", element.dataset.favoriteId || state.selectedFavoriteId));
        }

        if (action === "convert-favorite") {
          element.addEventListener("click", () => openForm("convert", "行程", element.dataset.favoriteId || state.selectedFavoriteId));
        }

        if (action === "delete-itinerary") {
          element.addEventListener("click", () => {
            const stop = findStopById(element.dataset.stopId || state.selectedStopId);
            if (!stop || !confirm(`確定刪除「${stop.title}」？`)) return;
            sendWrite("delete", { id: stopId(stop), type: "行程", title: stop.title });
          });
        }

        if (action === "delete-favorite") {
          element.addEventListener("click", () => {
            const place = findFavoriteById(element.dataset.favoriteId || state.selectedFavoriteId);
            if (!place || !confirm(`確定刪除「${place.title}」？`)) return;
            sendWrite("delete", { id: favoriteId(place), type: "收藏", title: place.title });
          });
        }

        if (action === "cancel-form") {
          element.addEventListener("click", () => {
            state.screen = state.previousScreen || "today";
            state.formMode = "";
            state.formType = "";
            state.formId = "";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "submit-form") {
          element.addEventListener("submit", (event) => {
            event.preventDefault();
            const form = event.currentTarget;
            const data = Object.fromEntries(new FormData(form).entries());
            const payload = {
              id: data.id || "",
              type: data.type || "行程",
              date: data.date || "",
              time: data.time || "",
              endTime: data.endTime || "",
              title: data.title || "",
              category: data.category || "景點",
              area: data.area || "",
              address: data.address || "",
              notice: data.notice || "",
              imageUrl: data.imageUrl || "",
              priority: data.priority || ""
            };

            const actionName = state.formMode === "edit" || state.formMode === "convert" ? "update" : "create";
            sendWrite(actionName, payload);
          });
        }

        if (action === "back-from-detail") {
          element.addEventListener("click", () => {
            state.screen = state.previousScreen || "today";
            state.selectedStopId = "";
            state.selectedFavoriteId = "";
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

      });
    }

    async function loadRows(force = false) {
      state.loading = true;
      state.message = force ? "正在更新最新行程資料" : "";
      render();

      try {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 12000);
        const url = force ? `${SHEET_CSV_URL}${SHEET_CSV_URL.includes("?") ? "&" : "?"}_=${Date.now()}` : SHEET_CSV_URL;

        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        window.clearTimeout(timeout);

        if (!response.ok) throw new Error("資料讀取失敗");

        const text = await response.text();
        const parsed = parseCSV(text);
        if (!parsed.length) throw new Error("雲端表格沒有可讀資料");

        state.rows = parsed;
        localStorage.setItem("trip-html:google-sheet-live-v1", JSON.stringify(parsed));
        state.message = force ? "行程已更新" : "";
      } catch (error) {
        const cached = localStorage.getItem("trip-html:google-sheet-live-v1");
        if (cached) {
          state.rows = JSON.parse(cached).map(normalizeRow);
          state.message = "目前顯示上次儲存的行程";
        } else {
          state.rows = SAMPLE_ROWS;
          state.message = "目前暫時顯示內建行程，雲端資料連線後會自動更新";
        }
      } finally {
        state.loading = false;
        ensureSelectedDate();
        render();

        if (state.message === "行程已更新") {
          setTimeout(() => {
            if (state.message === "行程已更新") {
              state.message = "";
              render();
            }
          }, 1800);
        }
      }
    }

    render();
    loadRows(false);
  </script>
</body>
</html>
