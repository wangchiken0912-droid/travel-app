<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>大阪・京都行程</title>
  <meta name="theme-color" content="#FFFFFF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --card-soft: #f9fafb;
      --text: #111827;
      --muted: #6b7280;
      --light: #9ca3af;
      --line: #e5e7eb;
      --line-soft: #f1f5f9;
      --primary: #2f80a8;
      --primary-dark: #1f5f7e;
      --primary-soft: #e7f4f8;
      --warning: #f59e0b;
      --warning-soft: #fff7ed;
      --danger: #dc2626;
      --danger-soft: #fef2f2;
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.07);
      --shadow-soft: 0 8px 22px rgba(15, 23, 42, 0.05);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      width: min(100%, 430px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 0 0 calc(78px + var(--safe-bottom));
      background: var(--bg);
    }

    .page {
      min-height: calc(100dvh - 78px);
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 16px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .trip-title {
      margin: 0;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .trip-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      line-height: 1.5;
    }

    .ghost-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      box-shadow: var(--shadow-soft);
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .edit-btn {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      box-shadow: var(--shadow-soft);
    }

    .edit-btn.active {
      border-color: rgba(47, 128, 168, 0.22);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .ghost-btn:active,
    .primary-btn:active,
    .secondary-btn:active,
    .date-chip:active,
    .nav-btn:active,
    .card-button:active {
      transform: scale(0.985);
    }

    .content {
      padding: 14px 18px 0;
    }

    .section {
      margin: 0 0 14px;
    }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 0 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.01em;
    }

    .section-title span {
      color: var(--light);
      font-size: 12px;
      font-weight: 800;
    }

    .section-title-group {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .section-title .mini-action {
      flex: 0 0 auto;
      padding: 8px 11px;
      font-size: 11.5px;
      white-space: nowrap;
    }

    .hero {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: 18px;
      background: #fff;
      box-shadow: none;
    }

    .hero-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 11px 14px 8px;
    }

    .date-stack {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .date-label {
      display: block;
      color: var(--text);
      font-size: 12px;
      font-weight: 950;
      line-height: 1.25;
    }

    .date-sub-label {
      color: var(--light);
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.25;
    }

    .hero h2 {
      margin: 0;
      font-size: 17px;
      font-weight: 950;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .hero p {
      display: -webkit-box;
      overflow: hidden;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.5;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .hero-stats {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      background: #fff;
      padding: 0;
    }

    .hero-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      padding: 5px 7px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: var(--card-soft);
      text-align: left;
    }

    .hero-stat strong {
      display: inline;
      font-size: 13px;
      font-weight: 950;
    }

    .hero-stat span {
      display: inline;
      color: var(--light);
      font-size: 10px;
      font-weight: 900;
    }

    .next-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(47, 128, 168, 0.15);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(47, 128, 168, 0.10), rgba(255,255,255,0.0) 55%),
        #fff;
      box-shadow: var(--shadow);
    }

    .next-card-inner {
      padding: 16px;
    }

    .eyebrow {
      color: var(--primary);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.08em;
    }

    .next-title {
      margin: 8px 0 0;
      font-size: 24px;
      font-weight: 950;
      line-height: 1.15;
      letter-spacing: -0.025em;
    }

    .next-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 26px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card-soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      line-height: 1.2;
    }

    .pill.primary {
      border-color: rgba(47, 128, 168, 0.15);
      background: var(--primary-soft);
      color: var(--primary-dark);
    }

    .pill.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .next-address {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.55;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 14px;
    }

    .primary-btn,
    .secondary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 950;
      transition: transform 0.16s ease;
    }

    .primary-btn {
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .secondary-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
    }

    .notice {
      border: 1px solid rgba(47, 128, 168, 0.12);
      border-radius: var(--radius-lg);
      background: var(--primary-soft);
      padding: 12px 13px;
      color: #1f5f7e;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.65;
    }

    .notice.warning {
      border-color: rgba(245, 158, 11, 0.18);
      background: var(--warning-soft);
      color: #92400e;
    }

    .status-message {
      margin: 0 0 12px;
      border: 1px solid rgba(245, 158, 11, 0.20);
      border-radius: var(--radius-md);
      background: var(--warning-soft);
      padding: 10px 12px;
      color: #92400e;
      font-size: 12px;
      font-weight: 850;
      line-height: 1.55;
    }

    .date-rail {
      position: sticky;
      top: 75px;
      z-index: 25;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -18px 12px;
      padding: 8px 18px 10px;
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(18px);
      scrollbar-width: none;
    }

    .date-rail::-webkit-scrollbar,
    .map-stop-row::-webkit-scrollbar {
      display: none;
    }

    .date-chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      transition: transform 0.16s ease;
    }

    .date-chip.active {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .stop-list {
      display: grid;
      gap: 12px;
    }

    .today-list {
      display: grid;
      gap: 0;
      background: #fff;
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
    }

    .today-item {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 12px 0;
      background: #fff;
    }

    .today-item:not(:last-child) {
      border-bottom: 1px solid var(--line-soft);
    }

    .today-item .thumb {
      flex: 0 0 64px;
      width: 64px;
      height: 64px;
      border-radius: 14px;
      box-shadow: none;
    }

    .today-item .thumb-placeholder svg {
      width: 30px;
      height: 30px;
    }

    .today-item .thumb-time {
      top: 5px;
      left: 5px;
      padding: 3px 5px;
      font-size: 8.5px;
      background: rgba(17, 24, 39, 0.56);
    }

    .today-item .thumb-icon {
      right: 5px;
      bottom: 5px;
      width: 22px;
      height: 22px;
      font-size: 9.5px;
      box-shadow: none;
    }

    .today-body {
      min-width: 0;
      flex: 1;
      padding-right: 4px;
    }

    .today-title {
      margin: 0;
      display: -webkit-box;
      overflow: hidden;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      line-height: 1.28;
      letter-spacing: -0.01em;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .today-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
      color: var(--light);
      font-size: 11px;
      font-weight: 850;
      line-height: 1.2;
    }

    .today-meta span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .today-address {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.45;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .today-alert {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 6px;
      color: #92400e;
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1.35;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .today-item,
    .timeline-item {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .today-item:active,
    .timeline-item:active {
      opacity: 0.72;
    }

    .today-tail {
      display: grid;
      place-items: center;
      width: 18px;
      color: var(--light);
      font-size: 20px;
      font-weight: 500;
    }

    .favorite-thumb .thumb-icon {
      right: 5px;
      bottom: 5px;
    }

    .detail-hero {
      overflow: hidden;
      border-bottom: 1px solid var(--line-soft);
      background: #fff;
    }

    .detail-image {
      position: relative;
      height: 210px;
      overflow: hidden;
      background: #eef2f6;
    }

    .detail-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-image .thumb-placeholder svg {
      width: 76px;
      height: 76px;
    }

    .detail-body {
      padding: 16px 18px 22px;
      background: #fff;
    }

    .detail-top-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .back-btn,
    .favorite-btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 900;
    }

    .favorite-btn.active {
      border-color: rgba(47, 128, 168, 0.22);
      background: rgba(47, 128, 168, 0.1);
      color: var(--primary);
    }

    .detail-title {
      margin: 0;
      color: var(--text);
      font-size: 26px;
      font-weight: 950;
      letter-spacing: -0.03em;
      line-height: 1.12;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
    }

    .detail-section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line-soft);
    }

    .detail-label {
      margin-bottom: 7px;
      color: var(--light);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.05em;
    }

    .detail-text {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.7;
      word-break: break-word;
    }

    .detail-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .favorite-empty {
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      background: #fff;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.65;
    }

    .favorite-empty strong {
      display: block;
      color: var(--text);
      font-size: 16px;
      font-weight: 950;
      margin-bottom: 5px;
    }

    .timeline-list {
      display: grid;
      gap: 0;
      margin-top: 2px;
      background: #fff;
    }

    .timeline-item {
      position: relative;
      display: grid;
      grid-template-columns: 50px 24px 1fr;
      gap: 9px;
      align-items: start;
      min-height: 72px;
    }

    .timeline-item:not(:last-child) {
      padding-bottom: 10px;
    }

    .timeline-time {
      padding-top: 4px;
      text-align: right;
    }

    .timeline-time strong {
      display: block;
      color: var(--text);
      font-size: 11.5px;
      font-weight: 950;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .timeline-time span {
      display: block;
      margin-top: 3px;
      color: var(--light);
      font-size: 9px;
      font-weight: 850;
      line-height: 1.15;
    }

    .timeline-node {
      position: relative;
      display: grid;
      place-items: center;
      width: 22px;
      height: 22px;
      margin-top: 3px;
      border: 2px solid #dbeef5;
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      font-size: 8.8px;
      font-weight: 950;
      box-shadow: 0 0 0 4px #fff;
      z-index: 2;
    }

    .timeline-item:not(:last-child) .timeline-node::after {
      content: "";
      position: absolute;
      top: 22px;
      left: 50%;
      width: 1px;
      height: calc(100% + 52px);
      transform: translateX(-50%);
      background: #d9edf4;
      z-index: -1;
    }

    .timeline-card {
      display: block;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 2px 0 10px;
      box-shadow: none;
    }

    .timeline-content {
      min-width: 0;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 12px;
    }

    .timeline-item:last-child .timeline-content {
      border-bottom: 0;
    }

    .timeline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 5px;
      color: var(--light);
      font-size: 10.5px;
      font-weight: 850;
      line-height: 1.25;
    }

    .timeline-meta span {
      display: inline-flex;
      align-items: center;
    }

    .timeline-title {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -0.01em;
      line-height: 1.32;
    }

    .timeline-address {
      display: -webkit-box;
      overflow: hidden;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.45;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
    }

    .timeline-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 650;
      line-height: 1.5;
    }

    .timeline-note.warning {
      color: #92400e;
      font-weight: 800;
    }

    .timeline-actions {
      display: none;
    }

    .timeline-thumb {
      position: relative;
      width: 70px;
      height: 70px;
      overflow: hidden;
      border-radius: 15px;
      background: #eef2f6;
      align-self: start;
    }

    .timeline-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .timeline-thumb .thumb-placeholder svg {
      width: 34px;
      height: 34px;
    }

    .stop-card {
      overflow: hidden;
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-lg);
      background: #fff;
      box-shadow: var(--shadow-soft);
    }

    .stop-main {
      display: flex;
      gap: 12px;
      padding: 12px;
    }

    .thumb {
      position: relative;
      flex: 0 0 96px;
      width: 96px;
      height: 96px;
      overflow: hidden;
      border-radius: 19px;
      background: #eef2f6;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.68);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-placeholder {
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.76), transparent 28%),
        linear-gradient(145deg, var(--thumb-a), var(--thumb-b) 54%, var(--thumb-c));
    }

    .thumb-placeholder::before {
      content: "";
      position: absolute;
      inset: 9px;
      z-index: -1;
      border: 1px solid rgba(255, 255, 255, 0.48);
      border-radius: 15px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.22), transparent 42%),
        radial-gradient(circle at 18% 84%, rgba(255, 255, 255, 0.3), transparent 24%);
    }

    .thumb-placeholder::after {
      content: "";
      position: absolute;
      right: -18px;
      bottom: -18px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }

    .thumb-placeholder svg {
      width: 46px;
      height: 46px;
      color: rgba(255, 255, 255, 0.92);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.65;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 10px 18px rgba(15, 23, 42, 0.18));
    }

    .thumb-placeholder.scene {
      --thumb-a: #7cc7d9;
      --thumb-b: #4e9ab9;
      --thumb-c: #224f70;
    }

    .thumb-placeholder.food {
      --thumb-a: #f3b37f;
      --thumb-b: #e98248;
      --thumb-c: #8f4429;
    }

    .thumb-placeholder.transport {
      --thumb-a: #90d6e7;
      --thumb-b: #36a4c0;
      --thumb-c: #1d5d7d;
    }

    .thumb-placeholder.shopping {
      --thumb-a: #b7a8f4;
      --thumb-b: #8067d7;
      --thumb-c: #423083;

    /* Osaka theme override: 全白底大阪都會質感版 */
:root {
      --bg: #FFFFFF;
      --card: #FFFFFF;
      --card-soft: #F7F7F7;
      --text: #1F1F1F;
      --muted: #72777F;
      --light: #9CA3AF;
      --line: #ECECEC;
      --line-soft: #F2F3F5;
      --primary: #2F80ED;
      --primary-dark: #155EEF;
      --primary-soft: #EAF3FF;
      --warning: #C8A96B;
      --warning-soft: #FBF5E6;
      --danger: #FF5A5F;
      --danger-soft: #FFF1F2;
      --shadow: 0 14px 36px rgba(16, 24, 40, 0.055);
      --shadow-soft: 0 8px 20px rgba(16, 24, 40, 0.04);
    }

    body {
      background: #FFFFFF;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 999;
      background: linear-gradient(90deg, #2F80ED 0%, #C8A96B 55%, #3E5F4A 100%);
      pointer-events: none;
    }

    .app {
      background: #FFFFFF;
    }

    .date-rail {
      background: rgba(255, 255, 255, 0.96);
      border-bottom-color: rgba(236,236,236,0.94);
    }

    .trip-title {
      color: #1F1F1F;
    }

    .trip-subtitle::before {
      content: "";
      color: #2F80ED;
      font-weight: 950;
      letter-spacing: 0.08em;
    }

    .content {
      background: #FFFFFF;
    }

    .primary-btn,
    .date-chip.active,
    .expense-mini-tab.active,
    .mini-action.primary {
      border-color: #2F80ED;
      background: #2F80ED;
      color: #fff;
      box-shadow: 0 10px 22px rgba(47,128,237,0.16);
    }

    .primary-btn:active,
    .mini-action.primary:active {

    .secondary-btn,

    }

    .nav-btn.active {
      background: transparent;

    }

    .nav-btn.active::before {
      content: "";
      position: absolute;
      top: 4px;
      left: 50%;
      width: 20px;
      height: 2px;
      border-radius: 999px;
      transform: translateX(-50%);

    }

    async function fetchLatestFxRate() {
      const sources = [
        {
          url: "https://api.frankfurter.app/latest?from=JPY&to=TWD",
          parse: (data) => Number(data?.rates?.TWD)
        },
        {
          url: "https://api.frankfurter.dev/v2/rate/JPY/TWD",
          parse: (data) => Number(data?.rate ?? data?.rates?.TWD)
        }
      ];

      let lastError = null;
      for (const source of sources) {
        try {
          const response = await fetch(source.url, { cache: "no-store" });
          if (!response.ok) throw new Error("匯率讀取失敗");
          const data = await response.json();
          const nextRate = source.parse(data);
          if (!Number.isFinite(nextRate) || nextRate <= 0) throw new Error("匯率格式不正確");

          state.fxRate = Number(nextRate.toFixed(5));
          state.fxUpdatedAt = new Date().toISOString();
          saveFxRate();
          saveFxUpdatedAt();
          return state.fxRate;
        } catch (error) {
          lastError = error;
        }
      }

      throw lastError || new Error("匯率更新失敗");
    }

    async function maybeAutoUpdateFxRate() {
      if (state.fxAutoChecked) return;
      state.fxAutoChecked = true;
      if (typeof navigator !== "undefined" && navigator.onLine === false) return;
      if (!shouldAutoUpdateFxRate()) return;

      try {
        await fetchLatestFxRate();
        if (state.screen === "money") render();
      } catch (error) {

      }

      const value = Number(amount || 0);

    function getScopedExpenses() {
      const list = Array.isArray(state.expenses) ? state.expenses : [];
      const sorted = [...list].sort((a, b) => `${b.date}_${b.createdAt}`.localeCompare(`${a.date}_${a.createdAt}`));
      if (state.moneyScope === "day") return sorted.filter((item) => item.date === todayISO());
      return sorted;

    function sumExpenses(list = getScopedExpenses()) {
      return list.reduce((totals, item) => {
        const amount = Number(item.amount || 0);
        if (item.currency === "JPY") totals.JPY += amount;
        if (item.currency === "TWD") totals.TWD += amount;
        totals.TWDConverted += expenseToTwd(item);
        return totals;
      }, { TWD: 0, JPY: 0, TWDConverted: 0 });
    }

      return (Array.isArray(state.expenses) ? state.expenses : [])

      lines.push(`日幣花費：${formatMoney(totals.JPY, "JPY")}`);
      lines.push(`台幣花費：${formatMoney(totals.TWD, "TWD")}`);
      lines.push("日幣現金剩餘：");
      FIXED_TRAVELERS.forEach((name) => {
        lines.push(`${name}：${formatMoney(getTravelerCashRemaining(name), "JPY")}`);
      });
      lines.push("");
      lines.push("每個人已花費：");
      travelerStats.forEach((person) => {
        lines.push(`${person.name}：約 ${formatMoney(Math.round(person.TWDConverted), "TWD")}（${formatMoney(person.JPY, "JPY")} / ${formatMoney(person.TWD, "TWD")}）`);

      lines.push("");

    function parseCSV(text) {
      const rows = [];
      let current = "";
      let row = [];
      let insideQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          current += '"';
          i += 1;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(current);
          current = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(current);
          current = "";
          if (row.some((cell) => cell.trim() !== "")) rows.push(row);
          row = [];
        } else {
          current += char;
        }
      }

      row.push(current);
      if (row.some((cell) => cell.trim() !== "")) rows.push(row);
      if (!rows.length) return [];

      const headers = rows[0].map(normalizeFieldName);
      return rows.slice(1).map((cells) => {
        const item = {};
        headers.forEach((header, index) => {
          item[header] = String(cells[index] ?? "").trim();
        });
        return normalizeRow(item);
      });
    }

        .sort((a, b) => {

          const aMinutes = toMinutes(a.time);

    function parseTripRangeFromSettings() {
      const settings = getSettings();
      const text = [settings.tripTitle, settings.tripSubtitle, settings.globalNotice].filter(Boolean).join(" ");
      const match = text.match(/(\d{1,2})\/(\d{1,2})\s*[–\-~～至到]\s*(\d{1,2})\/(\d{1,2})/);
      if (!match) return null;

      const existingDates = getNormalizedRows().map((row) => row.date).filter(Boolean).sort();
      const baseYear = existingDates[0]?.slice(0, 4) || String(new Date().getFullYear());
      const start = new Date(`${baseYear}-${match[1].padStart(2, "0")}-${match[2].padStart(2, "0")}T00:00:00`);
      const end = new Date(`${baseYear}-${match[3].padStart(2, "0")}-${match[4].padStart(2, "0")}T00:00:00`);
      if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime()) || end < start) return null;

      const dates = [];
      const cursor = new Date(start);
      while (cursor <= end) {
        dates.push(cursor.toISOString().slice(0, 10));
        cursor.setDate(cursor.getDate() + 1);
      }
      return dates;
    }

    function getTripDateOptions() {
      const rangeDates = parseTripRangeFromSettings();
      if (rangeDates && rangeDates.length) return rangeDates;
      return getDates();
    }

    function getDates() {
      return Array.from(new Set(getStops().map((stop) => stop.date).filter(Boolean)));
    }

    function getSettings() {
      const row = getNormalizedRows().find((item) => item.type === "settings") || {};
      return {
        ...row,
        tripTitle: row.tripTitle || row.title || "旅遊行程",
        tripSubtitle: row.tripSubtitle || "",
        globalNotice: row.globalNotice || row.notice || ""
      };
    }

    function getHotels() {
      return getNormalizedRows()
        .filter((row) => row.type === "hotel" && isVisible(row))
        .map((row) => ({
          type: "hotel",
          hotelName: row.hotelName || row.title || "未設定住宿名稱",
          hotelAddress: row.hotelAddress || row.address || "",
          hotelCheckin: row.hotelCheckin || "",
          hotelCheckout: row.hotelCheckout || "",
          hotelMapUrl: row.hotelMapUrl || row.mapUrl || "",
          notice: row.notice || "",
          visible: row.visible || "TRUE"
        }));
    }

    function getEmergencies() {
      return getNormalizedRows().filter((row) => row.type === "emergency" && isVisible(row));
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function formatDateLabel(dateString) {
      if (!dateString) return "未設定日期";
      const date = new Date(`${dateString}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString("zh-TW", { month: "numeric", day: "numeric", weekday: "short" });
    }

    function formatLongDate(dateString) {
      if (!dateString) return "未設定日期";
      const date = new Date(`${dateString}T00:00:00`);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString("zh-TW", { year: "numeric", month: "long", day: "numeric", weekday: "long" });
    }

    function getTripRange(dates) {
      if (!dates.length) return "尚未設定日期";
      if (dates.length === 1) return formatLongDate(dates[0]);
      return `${formatDateLabel(dates[0])} – ${formatDateLabel(dates[dates.length - 1])}`;
    }

    function toMinutes(time) {
      if (!/^\d{1,2}:\d{2}$/.test(time || "")) return null;
      const [hour, minute] = time.split(":").map(Number);
      return hour * 60 + minute;
    }

    function ensureSelectedDate() {
      const dates = getDates();
      if (!dates.length) {
        state.selectedDate = "";
        return;
      }

      if (state.selectedDate && dates.includes(state.selectedDate)) return;

      const today = todayISO();
      state.selectedDate = dates.find((date) => date >= today) || dates[0];
    }

    function getDayStops() {
      return getStops().filter((stop) => stop.date === state.selectedDate);
    }

    function getNextStop(dayStops) {
      if (!dayStops.length) return null;
      if (state.selectedDate !== todayISO()) return dayStops[0];

      const now = new Date();
      const current = now.getHours() * 60 + now.getMinutes();

      return dayStops.find((stop) => {
        const minutes = toMinutes(stop.time);
        return minutes !== null && minutes >= current;
      }) || dayStops[dayStops.length - 1];
    }

    function getDailyNotice() {
      const row = getNormalizedRows().find((item) => item.type === "daily_notice" && item.date === state.selectedDate && isVisible(item));
      return row?.dailyNotice || row?.notice || "";
    }

    function getDestinationQuery(place) {
      if ("lat" in place && place.lat && place.lng) return `${place.lat},${place.lng}`;
      if ("address" in place) return place.address || place.title;
      return place.hotelAddress || place.hotelName;
    }

    function buildMapsSearchUrl(place) {
      if ("mapUrl" in place && place.mapUrl) return place.mapUrl;
      if ("hotelMapUrl" in place && place.hotelMapUrl) return place.hotelMapUrl;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(getDestinationQuery(place))}`;
    }

    function buildCurrentLocationDirectionsUrl(place) {
      const params = new URLSearchParams();
      params.set("destination", getDestinationQuery(place));
      params.set("travelmode", "transit");
      return `https://www.google.com/maps/dir/?api=1&${params.toString()}`;
    }

    function compactText(value, maxLength = 90) {
      const text = String(value || "").trim();
      return text.length > maxLength ? `${text.slice(0, maxLength)}…` : text;
    }

    function favoriteSearchPlainLength(value) {
      return String(value || "").trim().replace(/\s+/g, "").length;
    }

    function favoriteSearchQueries(rawQuery) {
      const query = String(rawQuery || "").trim().replace(/\s+/g, " ");
      if (!query) return [];
      const hasArea = /大阪|京都|日本|Osaka|Kyoto|Japan|Namba|Umeda|Shinsaibashi|Dotonbori|Gion|Kawaramachi|Arashiyama|Nishiki/i.test(query);
      const queries = [query];
      if (!hasArea) {
        queries.push(`${query} 大阪`);
        queries.push(`${query} 京都`);
        queries.push(`${query} Osaka`);
        queries.push(`${query} Kyoto`);
      }
      return [...new Set(queries)].slice(0, 5);
    }

    function guessFavoriteSearchCategory(item) {
      const text = `${item?.class || ""} ${item?.type || ""} ${item?.category || ""}`.toLowerCase();
      if (/restaurant|food|cafe|bar|pub|fast_food|ice_cream|bakery/.test(text)) return "餐廳";
      if (/shop|mall|supermarket|convenience|marketplace|department_store/.test(text)) return "購物";
      if (/hotel|hostel|guest_house|apartment/.test(text)) return "住宿";
      if (/station|railway|subway|bus|transport|ferry|airport/.test(text)) return "交通";
      return "景點";
    }

    function normalizeFavoriteSearchPlace(item) {
      const displayName = String(item?.display_name || "").trim();
      const title = String(item?.name || displayName.split(",")[0] || "未命名地點").trim();
      const address = displayName || title;
      const lat = Number(item?.lat);
      const lng = Number(item?.lon);
      return {
        title,
        address,
        category: guessFavoriteSearchCategory(item),
        lat: Number.isFinite(lat) ? lat : null,
        lng: Number.isFinite(lng) ? lng : null,
        sourceId: `${item?.osm_type || ""}_${item?.osm_id || ""}`
      };
    }

    function buildFavoriteSearchMapsUrl(place) {
      if (place?.lat && place?.lng) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${place.lat},${place.lng}`)}`;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${place?.title || ""} ${place?.address || ""}`.trim())}`;
    }

    function buildFavoriteSearchGoogleUrl(query) {
      const text = String(query || "").trim();
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(text || "大阪 京都")}`;
    }

    function isFavoriteSearchResultAlreadySaved(place) {
      const title = String(place?.title || "").trim().toLowerCase();
      const address = String(place?.address || "").trim().toLowerCase();
      return getFavoritePlaces().some((item) => {
        const itemTitle = String(item.title || "").trim().toLowerCase();
        const itemAddress = String(item.address || "").trim().toLowerCase();
        return itemTitle === title && (!address || !itemAddress || itemAddress === address);
      });
    }

    async function fetchFavoriteSearchResults(query) {
      const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&countrycodes=jp&accept-language=zh-TW,zh,en,ja&q=${encodeURIComponent(query)}`;
      const response = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!response.ok) throw new Error("search failed");
      return response.json();
    }

    async function runFavoritePlaceSearch() {
      const query = String(state.favoriteSearchQuery || "").trim();
      if (!query) {
        state.favoriteSearchError = "請先輸入想收藏的地點";
        state.favoriteSearchResults = [];
        state.favoriteSearchLoading = false;
        render();
        return;
      }

      state.favoriteSearchLoading = true;
      state.favoriteSearchError = "";
      state.favoriteSearchResults = [];
      render();

      try {
        const seen = new Set();
        const results = [];
        const queries = favoriteSearchQueries(query);
        const responses = await Promise.allSettled(queries.map(fetchFavoriteSearchResults));
        responses.forEach((result) => {
          if (result.status !== "fulfilled") return;
          const items = Array.isArray(result.value) ? result.value : [];
          items.map(normalizeFavoriteSearchPlace).filter((item) => item.title).forEach((item) => {
            const key = `${item.title}__${item.address}`.toLowerCase();
            if (seen.has(key)) return;
            seen.add(key);
            results.push(item);
          });
        });
        state.favoriteSearchResults = results.slice(0, 6);
        if (!state.favoriteSearchResults.length) state.favoriteSearchError = "找不到結果，可以多打一點名稱，或加上大阪 / 京都 / 英文名";
      } catch (error) {
        state.favoriteSearchError = "搜尋失敗，請確認網路後再試";
      } finally {
        state.favoriteSearchLoading = false;
        render();
      }
    }

    function favoriteFilterCategories() {
      const base = ["全部", "景點", "餐廳", "購物", "交通", "住宿", "備用"];
      const dynamic = getFavoritePlaces().map((place) => place.category).filter(Boolean);
      return Array.from(new Set([...base, ...dynamic]));
    }

    function findTimeConflict(payload) {
      if (!payload || normalizeTypeValue(payload.type || payload.類型 || "") !== "itinerary") return null;
      if (!payload.date || !payload.time) return null;
      const currentMinutes = toMinutes(payload.time);
      if (currentMinutes === null) return null;
      const currentId = String(payload.id || state.formId || "");

      return getStops().find((stop) => {
        if (stop.date !== payload.date || !stop.time) return false;
        const existingId = stopId(stop);
        if (currentId && existingId === currentId) return false;
        const existingMinutes = toMinutes(stop.time);
        if (existingMinutes === null) return false;
        return Math.abs(existingMinutes - currentMinutes) < 30;
      }) || null;
    }

    function timeConflictMessage(payload) {
      const conflict = findTimeConflict(payload);
      if (!conflict) return "";
      return `提醒：這筆行程跟 ${conflict.time || "未設定時間"}「${conflict.title}」距離少於 30 分鐘，建議確認移動時間是否足夠`;
    }

    function searchImeLocked(event) {
      if (state.screen !== "search") return false;
      if (event?.target?.closest?.("[data-action='search-input']")) return false;
      return state.searchComposing || Date.now() < state.searchImeTapBlockUntil;
    }

    function blockSearchImeGhostTap(event) {
      if (!searchImeLocked(event)) return;
      event.preventDefault();
      event.stopPropagation();
      if (typeof event.stopImmediatePropagation === "function") event.stopImmediatePropagation();
    }

    function armSearchImeTapBlock(duration = 800) {
      state.searchImeTapBlockUntil = Math.max(state.searchImeTapBlockUntil, Date.now() + duration);
    }

    function applySearchQueryFromInput() {
      const input = app.querySelector("[data-action='search-input']");
      if (input) state.searchDraft = input.value;
      state.query = String(state.searchDraft || "").trim();
      render();
    }

    

    function categoryIcon(category) {
      if (category === "交通" || category === "車站") return "↗";
      if (category === "餐廳") return "食";
      if (category === "購物") return "買";
      if (category === "住宿") return "宿";
      if (category === "備用") return "+";
      return "景";
    }

    function categoryKey(category) {
      if (category === "交通" || category === "車站") return "transport";
      if (category === "餐廳") return "food";
      if (category === "購物") return "shopping";
      if (category === "住宿") return "hotel";
      if (category === "備用") return "backup";
      return "scene";
    }

    function placeholderSvg(category) {
      const key = categoryKey(category);
      if (key === "transport") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 34c6-13 18-20 27-23"></path><path d="M10 35h8"></path><path d="M31 13h8"></path><circle cx="14" cy="34" r="3.5"></circle><circle cx="34" cy="14" r="3.5"></circle><path d="M20 28h8"></path><path d="M24 24v8"></path></svg>`;
      if (key === "food") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M13 28h22"></path><path d="M16 28c0 6 4 10 8 10s8-4 8-10"></path><path d="M18 18c0-3 2-4 2-6"></path><path d="M25 18c0-3 2-4 2-6"></path><path d="M33 13v25"></path><path d="M37 13v25"></path></svg>`;
      if (key === "shopping") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M14 19h20l-2 19H16L14 19Z"></path><path d="M19 19c0-5 2-8 5-8s5 3 5 8"></path><path d="M20 28h8"></path></svg>`;
      if (key === "hotel") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 30h25"></path><path d="M12 15v23"></path><path d="M37 24v14"></path><path d="M12 24h13v6H12z"></path><path d="M25 22h7c3 0 5 2 5 5v3"></path></svg>`;
      if (key === "backup") return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 12v24"></path><path d="M12 24h24"></path><circle cx="24" cy="24" r="16"></circle></svg>`;
      return `<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M9 34 19 22l7 8 5-6 8 10"></path><path d="M13 34h26"></path><circle cx="32" cy="16" r="4"></circle><path d="M17 36c6 3 13 3 20 0"></path></svg>`;
    }

    function placeholderHtml(category, hidden = false) {
      const key = categoryKey(category);
      return `<div class="thumb-placeholder ${key}${hidden ? " hidden" : ""}">${placeholderSvg(category)}</div>`;
    }

    function badgeClass(value) {
      if (value === "交通" || value === "車站") return "transport";
      if (value === "餐廳") return "food";
      if (value === "購物") return "shopping";
      if (value === "住宿") return "hotel";
      if (value === "確定") return "confirmed";
      return "";
    }

    function thumbnailHtml(stop) {
      const time = stop.time || "--:--";
      const icon = categoryIcon(stop.category);
      const fallback = placeholderHtml(stop.category, Boolean(stop.imageUrl));
      const img = stop.imageUrl
        ? `<img src="${attr(stop.imageUrl)}" alt="${attr(stop.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />${fallback}`
        : fallback;

      return `
        <div class="thumb">
          ${img}
          <span class="thumb-time">${escapeHtml(time)}</span>
          <span class="thumb-icon">${escapeHtml(icon)}</span>
        </div>
      `;
    }

    function stopCardHtml(stop) {
      const title = escapeHtml(stop.title);
      const time = `${stop.time || "--:--"}${stop.endTime ? ` – ${stop.endTime}` : ""}`;
      const categoryBadge = `<span class="badge ${badgeClass(stop.category)}">${escapeHtml(stop.category)}</span>`;
      const statusBadge = stop.status ? `<span class="badge ${badgeClass(stop.status)}">${escapeHtml(stop.status)}</span>` : "";
      const durationBadge = stop.duration ? `<span class="badge">${escapeHtml(stop.duration)}</span>` : "";
      const address = stop.address ? `<div class="stop-address">${escapeHtml(stop.address)}</div>` : "";
      const transit = stop.transitNote ? `<div class="stop-note">${escapeHtml(stop.transitNote)}</div>` : "";
      const notice = stop.notice ? `<div class="stop-note warning">${escapeHtml(stop.notice)}</div>` : "";

      return `
        <article class="stop-card">
          <div class="stop-main">
            ${thumbnailHtml(stop)}
            <div class="stop-body">
              <div class="badge-row">${categoryBadge}${statusBadge}${durationBadge}</div>
              <h3 class="stop-title">${title}</h3>
              <div class="stop-time">${escapeHtml(time)}</div>
              ${address}
            </div>
          </div>
          ${transit}
          ${notice}
          <div class="stop-actions">
            <a class="card-button outline" href="${attr(buildMapsSearchUrl(stop))}" target="_blank" rel="noreferrer">查看地點</a>
            <a class="card-button filled" href="${attr(buildCurrentLocationDirectionsUrl(stop))}" target="_blank" rel="noreferrer">現在前往</a>
          </div>
        </article>
      `;
    }

    function timelineThumbnailHtml(stop) {
      const fallback = placeholderHtml(stop.category, Boolean(stop.imageUrl));
      const img = stop.imageUrl
        ? `<img src="${attr(stop.imageUrl)}" alt="${attr(stop.title)}" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');" />${fallback}`
        : fallback;

      return `<div class="timeline-thumb">${img}</div>`;
    }

    function timelineStopHtml(stop) {
      const id = stopId(stop);
      const time = stop.time || "--:--";
      const endTime = stop.endTime || "";
      const category = stop.category || "景點";
      const categoryClass = badgeClass(category);
      const duration = stop.duration ? `<span>${escapeHtml(stop.duration)}</span>` : "";
      const status = stop.status ? `<span>${escapeHtml(stop.status)}</span>` : "";
      const address = stop.address ? `<div class="timeline-address">${escapeHtml(stop.address)}</div>` : "";
      const transit = stop.transitNote ? `<div class="timeline-note">${escapeHtml(stop.transitNote)}</div>` : "";
      const notice = stop.notice ? `<div class="timeline-note warning">${escapeHtml(stop.notice)}</div>` : "";

      return `
        <article class="timeline-item" data-action="open-stop" data-stop-id="${attr(id)}" data-longpress-stop-id="${attr(id)}" tabindex="0" role="button" aria-label="查看 ${attr(stop.title)} 詳情">
          <div class="timeline-time">
            <strong>${escapeHtml(time)}</strong>
            ${endTime ? `<span>${escapeHtml(endTime)}</span>` : ""}
          </div>
          <div class="timeline-node ${categoryClass}">${escapeHtml(categoryIcon(category))}</div>
          <div class="timeline-card">
            <div class="timeline-content">
              <div class="timeline-meta">
                <span>${escapeHtml(category)}</span>
                ${duration}
                ${status}
              </div>
              <h3 class="timeline-title">${escapeHtml(stop.title)}</h3>
              ${address}
              ${transit}
              ${notice}
            </div>
          </div>
        </article>
      `;
    }

    function todayListItemHtml(stop) {
      const id = stopId(stop);
      const time = `${stop.time || "--:--"}${stop.endTime ? ` – ${stop.endTime}` : ""}`;
      const category = stop.category || "景點";
      const duration = stop.duration ? `<span>${escapeHtml(stop.duration)}</span>` : "";
      const status = stop.status ? `<span>${escapeHtml(stop.status)}</span>` : "";
      const address = stop.address ? `<div class="today-address">${escapeHtml(stop.address)}</div>` : "";
      const notice = stop.notice ? `<div class="today-alert">${escapeHtml(stop.notice)}</div>` : "";

      return `
        <article class="today-item" data-action="open-stop" data-stop-id="${attr(id)}" data-longpress-stop-id="${attr(id)}" tabindex="0" role="button" aria-label="查看 ${attr(stop.title)} 詳情">
          ${thumbnailHtml(stop)}
          <div class="today-body">
            <h3 class="today-title">${escapeHtml(stop.title)}</h3>
            <div class="today-meta">
              <span>${escapeHtml(time)}</span>
              <span>${escapeHtml(category)}</span>
              ${duration}
              ${status}
            </div>
            ${address}
            ${notice}
          </div>
          <div class="today-tail">›</div>
        </article>
      `;
    }

    function stopListHtml(stops, variant = "timeline") {
      if (!stops.length) {
        return `
          <section class="section">
            <div class="empty">
              <strong>這天還沒有行程</strong>
              在雲端表格新增行程後，這裡會自動顯示
            </div>
          </section>
        `;
      }

      if (variant === "today") {
        return `
          <section class="today-list">
            ${stops.map(todayListItemHtml).join("")}
          </section>
        `;
      }

      if (variant === "cards") {
        return `
          <section class="stop-list">
            ${stops.map(stopCardHtml).join("")}
          </section>
        `;
      }

      return `
        <section class="timeline-list">
          ${stops.map(timelineStopHtml).join("")}
        </section>
      `;
    }

    function dateRailHtml() {
      const dates = getDates();
      if (!dates.length) return "";

      return `
        <div class="date-rail">
          ${dates.map((date) => `
            <button class="date-chip ${date === state.selectedDate ? "active" : ""}" data-action="select-date" data-date="${attr(date)}">
              ${escapeHtml(formatDateLabel(date))}
            </button>
          `).join("")}
        </div>
      `;
    }

    function requireEditMode() {
      if (state.editMode) return true;
      const code = window.prompt("請輸入共用編輯碼");
      if (code === EDIT_CODE) {
        state.editMode = true;
        localStorage.setItem(EDIT_MODE_KEY, "ON");
        state.message = "已開啟編輯模式";
        render();
        return true;
      }
      if (code !== null) {
        state.message = "編輯碼錯誤";
        render();
      }
      return false;
    }

    function closeEditMode() {
      state.editMode = false;
      localStorage.removeItem(EDIT_MODE_KEY);
      state.message = "已關閉編輯模式";
      render();
    }

    function editOnly(html) {
      return state.editMode ? html : "";
    }

    function topHtml(titleOverride = "") {
      const settings = getSettings();
      const dates = getDates();
      const title = titleOverride || settings.tripTitle || "旅遊行程";
      const subtitle = settings.tripSubtitle || getTripRange(dates);

      return `
        <header class="top">
          <div class="top-row">
            <div>
              <h1 class="trip-title">${escapeHtml(title)}</h1>
              <p class="trip-subtitle">${escapeHtml(subtitle)}</p>
            </div>
            <div class="top-actions">
              <button class="ghost-btn" data-action="reload">更新</button>
              <button class="edit-btn ${state.editMode ? "active" : ""}" data-action="${state.editMode ? "close-edit-mode" : "open-edit-mode"}" type="button">${state.editMode ? "編輯中" : "管理"}</button>
            </div>
          </div>
        </header>
      `;
    }

    function messageHtml() {
      if (!state.message && !state.syncStatus) return "";

    function isWriteReady() {
      return Boolean(WRITE_WEB_APP_URL && WRITE_WEB_APP_URL.trim());
    }

    function actionPayload(action, data) {
      return {
        token: WRITE_TOKEN,
        action,
        data
      };
    }

    function normalizeWriteData(raw) {
      return {
        ID: raw.id || raw.ID || "",
        類型: raw.type || "行程",
        日期: raw.date || "",
        開始時間: raw.time || "",
        結束時間: raw.endTime || "",
        標題: raw.title || "",
        分類: raw.category || "景點",
        區域: raw.area || "",
        地址: raw.address || "",
        備註: raw.notice || "",
        圖片連結: raw.imageUrl || "",
        重要度: raw.priority || ""
      };
    }

    function makeTempId(type) {
      const prefix = type === "收藏" ? "FAV" : "TRIP";
      return `${prefix}-LOCAL-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 6)}`;
    }

    function writeDataToInternalRow(data, fallbackId = "") {
      const typeValue = data.type || data.類型 || "行程";
      return normalizeRow({
        id: data.id || data.ID || fallbackId || makeTempId(typeValue),
        type: typeValue,
        date: data.date || data.日期 || "",
        time: data.time || data.開始時間 || "",
        endTime: data.endTime || data.結束時間 || "",
        title: data.title || data.標題 || "",
        category: data.category || data.分類 || "景點",
        area: data.area || data.區域 || "",
        address: data.address || data.地址 || "",
        notice: data.notice || data.備註 || "",
        imageUrl: data.imageUrl || data.圖片連結 || "",
        priority: data.priority || data.重要度 || "",
        visible: "TRUE",
        updatedAt: new Date().toISOString().slice(0, 19).replace("T", " ")
      });
    }

    function saveRowsCache() {
      try {
        localStorage.setItem("trip-html:google-sheet-live-v1", JSON.stringify(state.rows));
      } catch (error) {}
    }

    function applyOptimisticChange(action, data) {
      const normalized = normalizeWriteData(data);
      const id = normalized.ID || normalized.id || data.id || data.ID || "";
      const internal = writeDataToInternalRow(data, id);

      if (action === "delete") {
        state.rows = state.rows.filter((row) => normalizeRow(row).id !== id);
      } else if (action === "update") {
        let found = false;
        state.rows = state.rows.map((row) => {
          const normalizedRow = normalizeRow(row);
          if (normalizedRow.id === id) {
            found = true;
            return { ...normalizedRow, ...internal, id };
          }
          return row;
        });
        if (!found) state.rows = [...state.rows, internal];
      } else if (action === "create") {
        state.rows = [...state.rows, internal];
      }

      saveRowsCache();
    }

    function returnAfterWrite(data) {
      const returnScreen = state.formReturnScreen || state.previousScreen || "";
      if (["detail", "favorite-detail"].includes(returnScreen)) {
        state.screen = returnScreen;
      } else if (returnScreen) {
        state.screen = returnScreen;
      } else {
        state.screen = data.type === "收藏" || data.類型 === "收藏" ? "favorites" : "today";
      }

      state.formMode = "";
      state.formType = "";
      state.formId = "";
      state.formReturnScreen = "";
    }

    function markFavoriteAsJoined(place) {
      const existingNotice = place.notice || "";
      const joinedNotice = existingNotice.includes("已加入行程")
        ? existingNotice
        : `${existingNotice}${existingNotice ? "｜" : ""}已加入行程`;
      return {
        ...place,
        type: "收藏",
        priority: "已加入",
        notice: joinedNotice
      };
    }

    async function sendConvertFavorite(payload) {
      const place = findFavoriteById(state.formId);
      if (!place) {
        state.message = "找不到這筆收藏";
        render();
        return;
      }

      const itineraryPayload = { ...payload, id: "", type: "行程" };
      const markedFavorite = markFavoriteAsJoined(place);

      applyOptimisticChange("create", itineraryPayload);
      applyOptimisticChange("update", markedFavorite);

      state.message = "已先加入本機行程";
      state.syncStatus = "正在同步 Google Sheet，收藏已標記為已加入";
      returnAfterWrite(itineraryPayload);
      render();

      if (!isWriteReady()) {
        state.syncStatus = "尚未設定 Google Apps Script 寫入端，本機暫存不會寫回 Google Sheet";
        render();
        return;
      }

      try {
        await fetch(WRITE_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(actionPayload("create", normalizeWriteData(itineraryPayload)))
        });

        await fetch(WRITE_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(actionPayload("update", normalizeWriteData(markedFavorite)))
        });

        state.message = "已送出";
        state.syncStatus = "等待 Google Sheet 發佈資料同步";
        render();
        window.setTimeout(() => loadRows(true), 2200);
      } catch (error) {
        state.message = "同步失敗";
        state.syncStatus = "已保留在本機暫存，請網路穩定後再試";
        render();
      }
    }

    async function sendWrite(action, data) {
      if (action === "create" && !data.id && !data.ID) {
        data = { ...data, id: makeTempId(data.type || data.類型 || "行程") };
      }

      applyOptimisticChange(action, data);

      state.message = action === "delete" ? "已先從本機移除" : "已先在本機顯示";
      state.syncStatus = "正在同步 Google Sheet";
      returnAfterWrite(data);
      render();

      if (!isWriteReady()) {
        state.syncStatus = "尚未設定 Google Apps Script 寫入端，本機暫存不會寫回 Google Sheet";
        render();
        return;
      }

      const payload = actionPayload(action, normalizeWriteData(data));

      try {
        await fetch(WRITE_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        state.message = "已送出";
        state.syncStatus = "等待 Google Sheet 發佈資料同步";
        render();

        window.setTimeout(() => loadRows(true), 2200);
      } catch (error) {
        state.message = "同步失敗";
        state.syncStatus = "已保留在本機暫存，請網路穩定後再試";
        render();
      }
    }

    function createExpenseRowsFromExpenseForm(data, formData, options = {}) {
      const amount = normalizeMoneyAmount(data.amount);
      if (!amount) return [];

      const splitType = ["self", "all", "custom"].includes(data.splitType) ? data.splitType : "self";
      const paidBy = normalizePayerName(data.paidBy || data.payer || state.travelers[0] || FIXED_TRAVELERS[0]);
      const customSplitWith = formData.getAll("splitWith").map(normalizePayerName).filter(Boolean);
      const owners = splitType === "all"
        ? [...state.travelers]
        : splitType === "custom"
          ? customSplitWith
          : [normalizePayerName(data.owner || paidBy)];
      const safeOwners = [...new Set(owners.length ? owners : [paidBy])];
      const groupId = splitType === "self" ? null : (options.groupId || `expense_group_${Date.now()}_${Math.random().toString(16).slice(2)}`);
      const totalAmount = Math.round(amount);
      const baseShare = Math.floor(totalAmount / safeOwners.length);
      const remainder = totalAmount % safeOwners.length;
      const title = String(data.title || "").trim() || "未命名花費";
      const currency = data.currency === "TWD" ? "TWD" : "JPY";
      const createdAt = options.createdAt || new Date().toISOString();

      return safeOwners.map((owner, index) => {
        const shareAmount = baseShare + (index < remainder ? 1 : 0);
        return {
          id: `expense_${Date.now()}_${index}_${Math.random().toString(16).slice(2)}`,
          groupId,
          groupSize: safeOwners.length,
          date: data.date || todayISO(),
          title,
          amount: shareAmount,
          originalAmount: totalAmount,
          currency,
          paidBy,
          owner,
          payer: owner,
          category: data.category || "其他",
          payment: data.payment === "刷卡" ? "刷卡" : "現金",
          note: String(data.note || "").trim(),
          splitType,
          splitWith: safeOwners,
          createdAt
        };
      });
    }

      const stops = getStops();
      const categories = ["全部", ...Array.from(new Set(stops.map((stop) => stop.category).filter(Boolean)))];
      const q = state.query.trim().toLowerCase();
      const draft = state.searchDraft || state.query;

      const searchedStops = stops.filter((stop) => {
        const matchCategory = state.category === "全部" || stop.category === state.category;
        const matchQuery = !q || Object.values(stop).join(" ").toLowerCase().includes(q);

    function goBackFromInnerScreen() {
      if (state.screen === "form") {
        state.screen = state.formReturnScreen || state.previousScreen || "today";
        state.formMode = "";
        state.formType = "";
        state.formId = "";
        state.formReturnScreen = "";
      } else if (["detail", "favorite-detail"].includes(state.screen)) {
        const target = ["detail", "favorite-detail", "form"].includes(state.previousScreen) ? "today" : (state.previousScreen || "today");
        state.screen = target;
        state.selectedStopId = "";
        state.selectedFavoriteId = "";
        state.formMode = "";
        state.formType = "";
        state.formId = "";
        state.formReturnScreen = "";
      } else {
        return;
      }

      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function setupSwipeBack() {
      let startX = 0;
      let startY = 0;
      let startTime = 0;

      app.ontouchstart = (event) => {
        if (!["detail", "favorite-detail", "form"].includes(state.screen)) return;
        const touch = event.changedTouches[0];
        startX = touch.clientX;
        startY = touch.clientY;
        startTime = Date.now();
      };

      app.ontouchend = (event) => {
        if (!["detail", "favorite-detail", "form"].includes(state.screen)) return;
        const touch = event.changedTouches[0];
        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;
        const elapsed = Date.now() - startTime;

        const startsNearLeftEdge = startX <= 90;
        const swipedRight = dx >= 80;
        const mostlyHorizontal = Math.abs(dy) <= 60;
        const notTooSlow = elapsed <= 900;

        if (startsNearLeftEdge && swipedRight && mostlyHorizontal && notTooSlow) {
          goBackFromInnerScreen();
        }
      };
    }

    function buildDayText() {
      const stops = getDayStops();
      const settings = getSettings();
      const lines = [];
      lines.push(`${settings.tripTitle || "旅遊行程"}`);
      lines.push(`${formatLongDate(state.selectedDate)}`);
      lines.push("");

      if (!stops.length) {
        lines.push("這天尚未設定行程");
        return lines.join("\n");
      }

      stops.forEach((stop, index) => {
        const time = `${stop.time || "--:--"}${stop.endTime ? `–${stop.endTime}` : ""}`;
        lines.push(`${index + 1}. ${time}｜${stop.title}`);
        if (stop.category) lines.push(`分類：${stop.category}`);
        if (stop.address) lines.push(`地址：${stop.address}`);
        if (stop.notice || stop.transitNote) lines.push(`備註：${stop.notice || stop.transitNote}`);
        lines.push("");
      });

      return lines.join("\n").trim();
    }

    async function copyTextToClipboard(textValue, successMessage = "已複製") {
      try {
        await navigator.clipboard.writeText(textValue);
        state.message = successMessage;
        state.syncStatus = "";
        render();
      } catch (error) {
        window.prompt("請手動複製以下內容", textValue);
      }
    }

      ensureSelectedDate();

      if (state.loading && !state.rows.length) {
        app.innerHTML = `

          </div>

        bindEvents();

      }

      let html = "";
      if (state.screen === "today") html = todayPageHtml();
      if (state.screen === "plan") html = planPageHtml();
      if (state.screen === "money") html = moneyPageHtml();
      if (state.screen === "info") html = infoPageHtml();
      if (state.screen === "favorites") html = favoritesPageHtml();
      if (state.screen === "detail") html = detailPageHtml();

    function bindEvents() {
      app.querySelectorAll("[data-action]").forEach((element) => {
        const action = element.dataset.action;

        if (action === "open-edit-mode") {
          element.addEventListener("click", () => requireEditMode());
        }

        if (action === "close-edit-mode") {
          element.addEventListener("click", () => closeEditMode());
        }

        if (action === "set-screen") {
          element.addEventListener("click", () => {
            state.previousScreen = element.dataset.screen;
            state.screen = element.dataset.screen;
            state.selectedStopId = "";
            state.selectedFavoriteId = "";
            state.formMode = "";
            state.formType = "";
            state.formId = "";
            state.formReturnScreen = "";
            if (state.screen === "search") state.searchDraft = state.query;
            render();
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        }

        if (action === "select-date") {
          element.addEventListener("click", () => {
            state.selectedDate = element.dataset.date;
            render();
          });
        }

        if (action === "reload") {
          element.addEventListener("click", () => loadRows(true));
        }

        if (action === "search-input") {
          element.addEventListener("compositionstart", () => {
            state.searchComposing = true;
            armSearchImeTapBlock(1600);
          });
          element.addEventListener("compositionend", (event) => {
            state.searchDraft = event.target.value;
            armSearchImeTapBlock(900);
            window.setTimeout(() => { state.searchComposing = false; }, 80);
          });
          element.addEventListener("input", (event) => {
            state.searchDraft = event.target.value;
            if (event.isComposing || state.searchComposing) return;
            if (!String(state.searchDraft || "").trim() && state.query) {
              state.query = "";
              render();
            }
          });
          element.addEventListener("keydown", (event) => {
            if (event.key !== "Enter") return;
            if (event.isComposing || state.searchComposing || event.keyCode === 229) return;
            event.preventDefault();
            applySearchQueryFromInput();
          });
        }

        if (action === "category-select") {
          element.addEventListener("change", (event) => {
            state.category = event.target.value;
            render();
          });
        }

        if (action === "clear-search") {
          element.addEventListener("click", () => {
            state.query = "";
            state.searchDraft = "";
            state.category = "全部";
            render();
          });
        }

        if (action === "submit-search") {
          element.addEventListener("click", (event) => {
            if (state.searchComposing || Date.now() < state.searchImeTapBlockUntil) {

        if (action === "submit-form") {
          element.addEventListener("submit", (event) => {
            event.preventDefault();
            if (!requireEditMode()) return;
            const form = event.currentTarget;
            const data = Object.fromEntries(new FormData(form).entries());
            const payload = {
              id: data.id || "",
              type: data.type || "行程",
              date: data.date || "",
              time: data.time || "",
              endTime: data.endTime || "",
              title: data.title || "",
              category: data.category || "景點",
              area: data.area || "",
              address: data.address || "",
              notice: data.notice || "",
              imageUrl: data.imageUrl || "",
              priority: data.priority || ""
            };

            const conflictMessage = timeConflictMessage(payload);
            if (conflictMessage) {
              const proceed = confirm(`${conflictMessage}

仍然要儲存嗎？`);
              if (!proceed) return;
            }

            if (state.formMode === "convert") {
              sendConvertFavorite(payload);
              return;
            }

            const actionName = state.formMode === "edit" ? "update" : "create";
            sendWrite(actionName, payload);
          });
        }

        if (action === "copy-address") {
          element.addEventListener("click", () => {
            copyTextToClipboard(element.dataset.copy || "", "地址已複製");
          });
        }

        if (action === "export-day-text") {
          element.addEventListener("click", () => {
            copyTextToClipboard(buildDayText(), "當日行程文字已複製");
          });
        }


        if (action === "set-money-scope") {
          element.addEventListener("click", () => {
            state.moneyScope = element.dataset.scope === "day" ? "day" : "trip";
            render();
          });
        }


        if (action === "save-money-settings") {
          element.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = Object.fromEntries(new FormData(event.currentTarget).entries());
            const fxRate = Number(String(data.fxRate || "").replace(/,/g, ""));
            if (!Number.isFinite(fxRate) || fxRate <= 0) {
              state.message = "匯率格式不正確";
              render();
              return;
            }

            state.fxRate = fxRate;
            state.cashWallet = {
              JPY: Object.fromEntries(FIXED_TRAVELERS.map((name) => {
                const raw = data[`cashJPY_${name}`] || "0";
                const amount = Number(String(raw).replace(/,/g, ""));
                return [name, Number.isFinite(amount) ? Math.max(0, amount) : 0];
              }))
            };
            state.travelers = [...FIXED_TRAVELERS];
            state.expenses = state.expenses.map((expense) => {
              const owner = normalizePayerName(expense.owner || expense.payer);
              const paidBy = normalizePayerName(expense.paidBy || expense.payer);
              return { ...expense, owner, paidBy, payer: owner };
            });

            state.fxUpdatedAt = new Date().toISOString();
            saveFxRate();
            saveFxUpdatedAt();
            saveCashWallet();
            saveTravelers();
            saveExpenses();
            state.moneySettingsOpen = true;
            state.message = "匯率跟三人日幣現金已更新";
            render();
          });
        }

        if (action === "update-fx-rate") {
          element.addEventListener("click", async () => {
            const originalText = element.textContent;
            element.disabled = true;
            element.textContent = "檢查中";
            state.moneySettingsOpen = true;

            try {
              await fetchLatestFxRate();
              state.message = "已抓取最新匯率";
            } catch (error) {
              state.message = "匯率更新失敗，已沿用目前匯率";
            } finally {
              element.disabled = false;
              element.textContent = originalText;
              state.moneySettingsOpen = true;
              render();
            }
          });
        }

        if (action === "set-expense-owner-filter") {
          element.addEventListener("click", () => {
            state.expenseOwnerFilter = element.dataset.owner || "all";
            render();
          });
        }


        if (action === "start-edit-expense") {
          element.addEventListener("click", () => {
            const id = element.dataset.expenseId || "";
            const item = state.expenses.find((expense) => expense.id === id);
            if (!item) return;
            if (item.groupId) {
              state.expenseEditChoiceId = id;
              state.expenseEditingId = "";
              state.expenseEditingMode = "";
            } else {
              state.expenseEditingId = id;
              state.expenseEditingMode = "single";
              state.expenseEditChoiceId = "";
            }
            render();
            setTimeout(() => document.getElementById("expense-edit-panel")?.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
          });
        }

        if (action === "choose-expense-edit") {
          element.addEventListener("click", () => {
            state.expenseEditingId = element.dataset.expenseId || state.expenseEditChoiceId || "";
            state.expenseEditingMode = element.dataset.editMode === "group" ? "group" : "single";
            state.expenseEditChoiceId = "";
            render();
            setTimeout(() => document.getElementById("expense-edit-panel")?.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
          });
        }

        if (action === "cancel-expense-edit-choice") {
          element.addEventListener("click", () => {
            state.expenseEditChoiceId = "";
            render();
          });
        }

        if (action === "cancel-expense-edit") {
          element.addEventListener("click", () => {
            state.expenseEditingId = "";
            state.expenseEditingMode = "";
            render();
          });
        }

        if (action === "save-expense-edit") {
          element.addEventListener("submit", (event) => {
            event.preventDefault();
            const formData = new FormData(event.currentTarget);
            const data = Object.fromEntries(formData.entries());
            const amount = normalizeMoneyAmount(data.amount);
            if (!amount) {
              state.message = "金額格式不正確";
              render();
              return;
            }

            const id = data.editingId || state.expenseEditingId;
            const mode = data.editingMode === "group" ? "group" : "single";
            const item = state.expenses.find((expense) => expense.id === id);
            if (!item) return;

            if (mode === "group" && item.groupId) {
              const newGroupItems = createExpenseRowsFromExpenseForm(data, formData, { groupId: item.groupId, createdAt: new Date().toISOString() });
              if (!newGroupItems.length) {
                state.message = "整組花費資料不完整";
                render();
                return;
              }
              state.expenses = [
                ...newGroupItems,
                ...state.expenses.filter((expense) => expense.groupId !== item.groupId)
              ];
              state.message = `已更新整組花費，共 ${newGroupItems.length} 筆`;
            } else {
              const owner = normalizePayerName(data.owner || item.owner || item.payer);
              const paidBy = normalizePayerName(data.paidBy || item.paidBy || item.payer);
              state.expenses = state.expenses.map((expense) => {
                if (expense.id !== id) return expense;
                return {
                  ...expense,
                  date: data.date || todayISO(),
                  title: String(data.title || "").trim() || "未命名花費",
                  amount: Math.round(amount),
                  originalAmount: expense.groupId ? expense.originalAmount : Math.round(amount),
                  currency: data.currency === "TWD" ? "TWD" : "JPY",
                  paidBy,
                  owner,
                  payer: owner,
                  category: data.category || "其他",
                  payment: data.payment === "刷卡" ? "刷卡" : "現金",
                  note: String(data.note || "").trim()
                };
              });
              state.message = "已更新這筆花費";
            }

            state.expenseEditingId = "";
            state.expenseEditingMode = "";
            state.expenseEditChoiceId = "";
            saveExpenses();
            render();
          });
        }

        if (action === "add-expense") {
          element.addEventListener("submit", (event) => {
            event.preventDefault();
            const formData = new FormData(event.currentTarget);
            const data = Object.fromEntries(formData.entries());
            const amount = normalizeMoneyAmount(data.amount);
            if (!amount) {
              state.message = "金額格式不正確";
              render();
              return;
            }

            const newExpenses = createExpenseRowsFromExpenseForm(data, formData);
            if (!newExpenses.length) {
              state.message = "花費資料不完整";
              render();
              return;
            }

            state.expenses = [...newExpenses, ...state.expenses];
            saveExpenses();
            state.message = newExpenses.length > 1 ? `已新增 ${newExpenses.length} 筆分攤花費` : "已新增花費紀錄";
            render();
          });
        }

        if (action === "delete-expense") {
          element.addEventListener("click", () => {
            const id = element.dataset.expenseId || "";
            const item = state.expenses.find((expense) => expense.id === id);
            if (!item) return;
            const ok = confirm(`確定要刪除這筆花費？\n\n${item.title}\n${formatMoney(item.amount, item.currency)}`);
            if (!ok) return;
            state.expenses = state.expenses.filter((expense) => expense.id !== id);
            saveExpenses();
            state.message = "已刪除花費紀錄";
            render();
          });
        }

        if (action === "export-expense-summary") {
          element.addEventListener("click", () => {
            copyTextToClipboard(buildExpenseSummaryText(), "花費摘要已複製");
          });
        }

        if (action === "back-from-detail") {
          element.addEventListener("click", () => goBackFromInnerScreen());
        }

      });


      app.querySelectorAll("[data-longpress-stop-id]").forEach((element) => {
        let timer = null;
        let moved = false;
        const clear = () => {
          if (timer) window.clearTimeout(timer);
          timer = null;
        };
        const start = () => {
          moved = false;
          clear();
          timer = window.setTimeout(() => {
            if (moved) return;
            state.quickStopActionId = element.dataset.longpressStopId || "";
            state.longPressIgnoreClickUntil = Date.now() + 900;
            render();
          }, 560);
        };
        element.addEventListener("touchstart", start, { passive: true });
        element.addEventListener("mousedown", start);
        element.addEventListener("touchmove", () => { moved = true; clear(); }, { passive: true });
        element.addEventListener("mousemove", () => { moved = true; clear(); });
        element.addEventListener("touchend", clear, { passive: true });
        element.addEventListener("mouseup", clear);
        element.addEventListener("mouseleave", clear);
      });

      app.querySelectorAll(".expense-settings-pop").forEach((details) => {
        details.addEventListener("toggle", () => {
          state.moneySettingsOpen = details.open;
        });
      });
    }

    async function loadRows(force = false) {
      state.loading = true;
      state.message = force ? "正在同步 Google Sheet 最新資料" : "";
      render();

      try {
        const controller = new AbortController();
        const timeout = window.setTimeout(() => controller.abort(), 12000);
        const url = force ? `${SHEET_CSV_URL}${SHEET_CSV_URL.includes("?") ? "&" : "?"}_=${Date.now()}` : SHEET_CSV_URL;

        const response = await fetch(url, { cache: "no-store", signal: controller.signal });
        window.clearTimeout(timeout);

        if (!response.ok) throw new Error("資料讀取失敗");

        const text = await response.text();
        const parsed = parseCSV(text);
        if (!parsed.length) throw new Error("雲端表格沒有可讀資料");

        state.rows = parsed;
        localStorage.setItem("trip-html:google-sheet-live-v1", JSON.stringify(parsed));
        state.message = force ? "已同步最新資料" : "";
      } catch (error) {
        const cached = localStorage.getItem("trip-html:google-sheet-live-v1");
        if (cached) {
          state.rows = JSON.parse(cached).map(normalizeRow);
          state.message = "目前顯示上次儲存的行程";
        } else {
          state.rows = SAMPLE_ROWS;
          state.message = "目前暫時顯示內建行程，雲端資料連線後會自動更新";
        }
      } finally {
        state.loading = false;
        ensureSelectedDate();
        render();

        if (state.message === "已同步最新資料") {
          setTimeout(() => {
            if (state.message === "已同步最新資料") {
              state.message = "";
              render();
            }
          }, 1800);
        }
      }
    }

    ["pointerdown", "pointerup", "touchstart", "touchend", "mousedown", "mouseup", "click"].forEach((eventName) => {
      app.addEventListener(eventName, blockSearchImeGhostTap, true);
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    render();
    loadRows(false);
    maybeAutoUpdateFxRate();
  </script>
</body>
</html>
